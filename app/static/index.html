<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Trailer - 徒步攻略助手</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
    <style>
      :root {
        --ink: #162118;
        --muted: #667166;
        --paper: #f7f3e8;
        --panel: #fffaf0;
        --line: #d8cfb9;
        --moss: #50683e;
        --moss-dark: #26351f;
        --clay: #a6532b;
        --fern: #dfe8ca;
        --sun: #f4c65a;
        --danger: #a43729;
        --shadow: 0 22px 70px rgba(50, 45, 30, 0.14);
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        min-height: 100vh;
        color: var(--ink);
        font-family: "Avenir Next", "Gill Sans", "Trebuchet MS", sans-serif;
        background:
          radial-gradient(circle at 10% 0%, rgba(244, 198, 90, 0.32), transparent 28rem),
          radial-gradient(circle at 88% 10%, rgba(80, 104, 62, 0.18), transparent 26rem),
          linear-gradient(135deg, #f8f4e9 0%, #eee5d1 100%);
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        opacity: 0.26;
        background-image:
          linear-gradient(rgba(22, 33, 24, 0.06) 1px, transparent 1px),
          linear-gradient(90deg, rgba(22, 33, 24, 0.04) 1px, transparent 1px);
        background-size: 32px 32px;
      }

      button, input, textarea, select { font: inherit; }

      .app-frame {
        width: min(1480px, calc(100% - 28px));
        margin: 0 auto;
        display: grid;
        grid-template-columns: 280px minmax(0, 1fr);
        gap: 22px;
        align-items: start;
        transition: grid-template-columns 0.2s ease;
      }

      .app-frame.history-collapsed {
        grid-template-columns: 56px minmax(0, 1fr);
      }

      .shell {
        width: 100%;
        min-width: 0;
        padding: 28px 0 40px;
      }

      .history-sidebar {
        position: sticky;
        top: 18px;
        max-height: calc(100vh - 36px);
        overflow: hidden;
        display: grid;
        grid-template-rows: auto minmax(0, 1fr);
        gap: 12px;
        padding: 18px;
        margin-top: 28px;
        border: 1px solid var(--line);
        border-radius: 10px;
        background: rgba(255, 250, 240, 0.88);
        box-shadow: var(--shadow);
        transition: padding 0.2s ease, border-color 0.2s ease, background 0.2s ease;
      }

      .history-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
      }

      .history-title-wrap {
        display: flex;
        align-items: center;
        gap: 8px;
        min-width: 0;
      }

      .history-mark {
        width: 24px;
        height: 24px;
        border-radius: 7px;
        display: grid;
        place-items: center;
        flex: 0 0 auto;
        background: var(--moss-dark);
        color: #fff9e8;
        font-size: 12px;
        font-weight: 900;
      }

      .history-head h2 {
        margin: 0;
        font-size: 15px;
        color: var(--moss-dark);
      }

      .history-actions {
        display: flex;
        align-items: center;
        gap: 6px;
        flex: 0 0 auto;
      }

      .history-new,
      .history-clear,
      .history-toggle {
        border: 1px solid var(--line);
        border-radius: 999px;
        background: #fffcf4;
        color: var(--muted);
        padding: 4px 9px;
        font-size: 11px;
        font-weight: 800;
        cursor: pointer;
      }

      .history-toggle {
        width: 28px;
        height: 28px;
        padding: 0;
        display: grid;
        place-items: center;
        color: var(--moss-dark);
        font-size: 13px;
      }

      .history-toggle:hover,
      .history-new:hover,
      .history-clear:hover {
        border-color: var(--moss);
        background: var(--fern);
        color: var(--moss-dark);
      }

      .history-list {
        min-height: 160px;
        overflow: auto;
        display: grid;
        align-content: start;
        gap: 8px;
        padding-right: 2px;
      }

      .history-empty {
        padding: 18px 12px;
        border: 1px dashed var(--line);
        border-radius: 8px;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.6;
        text-align: center;
      }

      .history-item {
        width: 100%;
        text-align: left;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fffcf4;
        padding: 10px;
        cursor: pointer;
        display: grid;
        gap: 5px;
      }

      .history-item:hover { border-color: var(--moss); background: rgba(223,232,202,0.28); }
      .history-item.active {
        border-color: var(--moss-dark);
        background: rgba(223,232,202,0.34);
        box-shadow: inset 3px 0 0 var(--moss-dark);
      }

      .history-title-row {
        display: flex;
        justify-content: space-between;
        gap: 8px;
        align-items: start;
      }

      .history-title {
        font-size: 13px;
        font-weight: 900;
        color: var(--moss-dark);
        line-height: 1.35;
      }

      .history-star {
        border: none;
        background: transparent;
        color: var(--clay);
        cursor: pointer;
        font-size: 16px;
        line-height: 1;
        padding: 0 2px;
      }

      .history-meta, .history-route {
        color: var(--muted);
        font-size: 11px;
        line-height: 1.45;
      }

      .app-frame.history-collapsed .history-sidebar {
        padding: 12px 8px;
        background: rgba(255, 250, 240, 0.78);
      }

      .app-frame.history-collapsed .history-head {
        display: grid;
        justify-items: center;
        gap: 10px;
      }

      .app-frame.history-collapsed .history-title-wrap h2,
      .app-frame.history-collapsed .history-new,
      .app-frame.history-collapsed .history-clear,
      .app-frame.history-collapsed .history-list {
        display: none;
      }

      .app-frame.history-collapsed .history-title-wrap {
        justify-content: center;
      }

      .app-frame.history-collapsed .history-actions {
        display: grid;
        justify-items: center;
      }

      .app-frame.history-collapsed .history-toggle {
        transform: rotate(180deg);
      }

      /* ---- Top Bar ---- */
      .topbar {
        display: flex;
        justify-content: space-between;
        gap: 20px;
        align-items: flex-start;
        margin-bottom: 24px;
      }

      .brand { display: grid; gap: 8px; }

      .eyebrow {
        color: var(--clay);
        font-size: 12px;
        font-weight: 800;
        letter-spacing: 0.14em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        max-width: 760px;
        font-family: Georgia, "Times New Roman", serif;
        font-size: clamp(32px, 6vw, 64px);
        line-height: 0.95;
        letter-spacing: 0;
      }

      .subtitle {
        max-width: 720px;
        margin: 10px 0 0;
        color: var(--muted);
        font-size: 15px;
        line-height: 1.6;
      }

      .status-pill {
        min-width: 120px;
        padding: 10px 14px;
        border: 1px solid var(--line);
        border-radius: 999px;
        background: rgba(255, 250, 240, 0.78);
        color: var(--moss-dark);
        font-size: 13px;
        font-weight: 800;
        text-align: center;
        box-shadow: 0 8px 24px rgba(50, 45, 30, 0.08);
      }

      /* ---- Module Tabs ---- */
      .module-tabs {
        display: flex;
        gap: 0;
        border-bottom: 2px solid var(--line);
        margin-bottom: 24px;
      }

      .module-tab {
        padding: 12px 28px;
        border: none;
        background: none;
        color: var(--muted);
        font-size: 15px;
        font-weight: 800;
        letter-spacing: 0.04em;
        cursor: pointer;
        position: relative;
        transition: color 0.2s;
      }

      .module-tab:hover { color: var(--moss-dark); }

      .module-tab.active {
        color: var(--moss-dark);
      }

      .module-tab.active::after {
        content: "";
        position: absolute;
        left: 0;
        right: 0;
        bottom: -2px;
        height: 3px;
        background: var(--moss-dark);
        border-radius: 2px 2px 0 0;
      }

      .module-tab.disabled {
        color: var(--line);
        cursor: default;
      }

      .module-tab .badge-soon {
        display: inline-block;
        margin-left: 6px;
        padding: 2px 7px;
        border-radius: 999px;
        background: var(--sun);
        color: var(--moss-dark);
        font-size: 10px;
        font-weight: 900;
        vertical-align: middle;
      }

      .module-content { display: none; }
      .module-content.active { display: block; }

      /* ---- Panel ---- */
      .panel {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(255, 250, 240, 0.86);
        box-shadow: var(--shadow);
        backdrop-filter: blur(10px);
      }

      /* ---- Upload Area ---- */
      .upload-zone {
        padding: 48px 32px;
        text-align: center;
        cursor: pointer;
        transition: background 0.2s;
        position: relative;
      }

      .upload-zone:hover { background: rgba(223, 232, 202, 0.3); }

      .upload-zone.dragging { background: rgba(223, 232, 202, 0.5); }

      .upload-icon {
        width: 72px;
        height: 72px;
        margin: 0 auto 16px;
        border: 2px dashed var(--line);
        border-radius: 50%;
        display: grid;
        place-items: center;
        background: var(--fern);
        font-size: 28px;
        color: var(--moss);
      }

      .upload-zone h3 {
        margin: 0 0 8px;
        font-size: 18px;
        color: var(--moss-dark);
      }

      .upload-zone p {
        margin: 0;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.6;
      }

      .upload-zone input[type="file"] {
        position: absolute;
        inset: 0;
        opacity: 0;
        cursor: pointer;
      }

      .file-info {
        display: none;
        align-items: center;
        gap: 12px;
        padding: 14px 18px;
        border-top: 1px solid var(--line);
        background: rgba(223, 232, 202, 0.25);
      }

      .file-info.show { display: flex; }

      .file-info .file-icon {
        width: 36px;
        height: 36px;
        border-radius: 8px;
        background: var(--moss);
        color: #fff9e8;
        display: grid;
        place-items: center;
        font-size: 14px;
        font-weight: 900;
        flex-shrink: 0;
      }

      .file-info .file-name {
        flex: 1;
        font-weight: 700;
        font-size: 14px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .file-info .file-size {
        color: var(--muted);
        font-size: 12px;
        flex-shrink: 0;
      }

      .file-info .btn-remove {
        border: none;
        background: none;
        color: var(--muted);
        cursor: pointer;
        font-size: 18px;
        padding: 4px;
        line-height: 1;
      }

      .file-info .btn-remove:hover { color: var(--danger); }

      /* ---- Two Column Layout ---- */
      .analysis-layout {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
        margin-top: 20px;
      }

      /* ---- Map Panel ---- */
      .map-panel {
        border: 1px solid var(--line);
        border-radius: 8px;
        overflow: hidden;
        box-shadow: var(--shadow);
      }

      .map-panel-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 10px 14px;
        background: linear-gradient(135deg, rgba(80, 104, 62, 0.12), rgba(244, 198, 90, 0.10));
        border-bottom: 1px solid var(--line);
      }

      .map-panel-header p {
        margin: 0;
        font-size: 13px;
        font-weight: 900;
        color: var(--moss-dark);
        letter-spacing: 0.06em;
        text-transform: uppercase;
      }

      .map-panel-header span {
        font-size: 12px;
        color: var(--muted);
      }

      #amap-container {
        width: 100%;
        height: 400px;
        background: #e8e4d8;
      }

      .map-placeholder {
        width: 100%;
        height: 400px;
        display: grid;
        place-items: center;
        color: var(--muted);
        font-size: 14px;
        background: #f0ece0;
        text-align: center;
        gap: 8px;
      }

      .map-route-legend {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        padding: 10px 14px;
        border-top: 1px solid var(--line);
        background: rgba(255,250,240,0.9);
      }

      .map-route-legend span {
        display: flex;
        align-items: center;
        gap: 5px;
        font-size: 12px;
        color: var(--muted);
      }

      .legend-dot {
        display: inline-block;
        width: 10px;
        height: 10px;
        border-radius: 50%;
        flex-shrink: 0;
      }

      /* ---- Elevation Profile ---- */
      .elevation-panel {
        border: 1px solid var(--line);
        border-radius: 8px;
        overflow: hidden;
        box-shadow: var(--shadow);
        background: rgba(255, 250, 240, 0.86);
      }

      .elevation-panel-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 10px 14px;
        background: linear-gradient(135deg, rgba(80, 104, 62, 0.12), rgba(244, 198, 90, 0.10));
        border-bottom: 1px solid var(--line);
      }

      .elevation-panel-header p {
        margin: 0;
        font-size: 13px;
        font-weight: 900;
        color: var(--moss-dark);
        letter-spacing: 0.06em;
        text-transform: uppercase;
      }

      .elevation-panel-header span {
        font-size: 12px;
        color: var(--muted);
      }

      .elevation-chart-wrap {
        padding: 14px;
        height: 372px;
      }

      .elevation-placeholder {
        height: 372px;
        display: grid;
        place-items: center;
        color: var(--muted);
        font-size: 14px;
        text-align: center;
      }

      /* ---- Stats Section ---- */
      .section-title {
        margin: 0 0 14px;
        font-size: 13px;
        color: var(--moss-dark);
        font-weight: 900;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .metrics {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
        gap: 10px;
        margin-top: 20px;
      }

      .metric {
        padding: 14px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fffcf4;
      }

      .metric .metric-label {
        display: block;
        color: var(--muted);
        font-size: 11px;
        font-weight: 800;
        text-transform: uppercase;
      }

      .metric .metric-value {
        display: block;
        margin-top: 6px;
        font-size: 22px;
        font-weight: 700;
      }

      .metric .metric-sub {
        display: block;
        margin-top: 2px;
        color: var(--muted);
        font-size: 11px;
      }

      /* ---- Route Cards ---- */
      .routes { display: grid; gap: 12px; margin-top: 20px; }

      .route-card {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fffcf4;
        overflow: hidden;
      }

      .route-card-head {
        display: flex;
        justify-content: space-between;
        gap: 14px;
        padding: 14px;
        border-bottom: 1px solid var(--line);
      }

      .route-card h3 { margin: 0; font-size: 18px; }

      .badge {
        align-self: start;
        white-space: nowrap;
        border-radius: 999px;
        padding: 5px 9px;
        color: #fff9e8;
        background: var(--moss);
        font-size: 12px;
        font-weight: 900;
      }

      .badge.medium { background: var(--clay); }
      .badge.high { background: var(--danger); }

      .route-body { padding: 14px; }

      .mini-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 10px;
      }

      .mini { color: var(--muted); font-size: 12px; }

      .mini strong {
        display: block;
        margin-top: 4px;
        color: var(--ink);
        font-size: 15px;
      }

      /* ---- KML Metadata ---- */
      .metadata-section {
        margin-top: 20px;
        padding: 16px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fffcf4;
      }

      .metadata-section h3 {
        margin: 0 0 12px;
        font-size: 14px;
        color: var(--moss-dark);
        font-weight: 900;
        letter-spacing: 0.06em;
        text-transform: uppercase;
      }

      .metadata-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 10px;
      }

      .meta-item {
        padding: 8px 0;
        border-bottom: 1px solid rgba(216, 207, 185, 0.5);
      }

      .meta-item:last-child { border-bottom: none; }

      .meta-key {
        font-size: 11px;
        font-weight: 800;
        color: var(--muted);
        text-transform: uppercase;
      }

      .meta-value {
        margin-top: 3px;
        font-size: 14px;
        word-break: break-all;
      }

      /* ---- Weather Section ---- */
      .weather-section {
        margin-top: 20px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(255, 250, 240, 0.86);
        box-shadow: var(--shadow);
        overflow: hidden;
      }

      .weather-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 12px 16px;
        background: linear-gradient(135deg, rgba(80, 104, 62, 0.12), rgba(244, 198, 90, 0.10));
        border-bottom: 1px solid var(--line);
        flex-wrap: wrap;
        gap: 10px;
      }

      .weather-header h3 {
        margin: 0;
        font-size: 13px;
        font-weight: 900;
        color: var(--moss-dark);
        letter-spacing: 0.06em;
        text-transform: uppercase;
      }

      .date-picker-row {
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
      }

      .date-picker-row label {
        font-size: 12px;
        font-weight: 800;
        color: var(--muted);
      }

      .date-picker-row input[type="date"] {
        width: 150px;
        padding: 6px 8px;
        border: 1px solid #cfc5ae;
        border-radius: 6px;
        background: #fffcf4;
        font-size: 13px;
        color: var(--ink);
      }

      .date-picker-row input[type="date"]:focus {
        border-color: var(--moss);
        box-shadow: 0 0 0 3px rgba(80, 104, 62, 0.14);
        outline: none;
      }

      .btn-query-weather {
        padding: 6px 14px;
        border: none;
        border-radius: 6px;
        background: var(--moss-dark);
        color: #fff9e8;
        font-size: 12px;
        font-weight: 800;
        cursor: pointer;
        transition: background 0.2s;
      }

      .btn-query-weather:hover { background: #1c2818; }

      .btn-query-weather:disabled {
        opacity: 0.5;
        cursor: wait;
      }

      .weather-body { padding: 16px; }

      .weather-result-summary {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 14px;
        flex-wrap: wrap;
      }

      .weather-result-summary .weather-count {
        font-size: 12px;
        color: var(--muted);
        font-weight: 800;
      }

      .weather-recommendation,
      .weather-notice {
        margin-bottom: 14px;
        padding: 12px 14px;
        border-radius: 8px;
        font-size: 13px;
        line-height: 1.6;
      }

      .weather-recommendation {
        border: 1px solid rgba(80, 104, 62, 0.28);
        background: rgba(223, 232, 202, 0.32);
        color: var(--moss-dark);
      }

      .weather-notice {
        border: 1px solid rgba(244, 198, 90, 0.48);
        background: rgba(244, 198, 90, 0.12);
        color: var(--ink);
      }

      .weather-recommendation strong,
      .weather-notice strong {
        display: block;
        margin-bottom: 4px;
        font-size: 12px;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }

      .weather-empty {
        padding: 24px;
        text-align: center;
        color: var(--muted);
        font-size: 14px;
      }

      .weather-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 12px;
      }

      .weather-card {
        padding: 14px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fffcf4;
        text-align: center;
        position: relative;
        transition: border-color 0.2s;
      }

      .weather-card.suitable {
        border-color: var(--moss);
        background: rgba(223, 232, 202, 0.2);
      }

      .weather-card.unsuitable {
        border-color: var(--danger);
        background: rgba(164, 55, 41, 0.04);
      }

      .weather-card.marginal {
        border-color: var(--sun);
        background: rgba(244, 198, 90, 0.08);
      }

      .weather-date {
        font-size: 13px;
        font-weight: 800;
        color: var(--ink);
        margin-bottom: 8px;
      }

      .weather-card-main {
        display: grid;
        gap: 5px;
      }

      .weather-card-meta {
        display: grid;
        gap: 5px;
        margin: 8px 0 10px;
        color: var(--muted);
        font-size: 12px;
      }

      .weather-icon {
        font-size: 28px;
        margin-bottom: 6px;
      }

      .weather-desc {
        font-size: 14px;
        font-weight: 700;
        color: var(--ink);
        margin-bottom: 4px;
      }

      .weather-temp {
        font-size: 12px;
        color: var(--muted);
        margin-bottom: 6px;
      }

      .weather-wind {
        font-size: 11px;
        color: var(--muted);
        margin-bottom: 8px;
      }

      .suitability-tag {
        display: inline-block;
        padding: 3px 10px;
        border-radius: 999px;
        font-size: 11px;
        font-weight: 900;
      }

      .suitability-tag.suitable {
        background: var(--moss);
        color: #fff9e8;
      }

      .suitability-tag.unsuitable {
        background: var(--danger);
        color: #fff9e8;
      }

      .suitability-tag.marginal {
        background: var(--sun);
        color: var(--moss-dark);
      }

      .weather-loading {
        padding: 24px;
        text-align: center;
        color: var(--muted);
      }

      .weather-error {
        padding: 12px 16px;
        border: 1px solid rgba(164, 55, 41, 0.36);
        border-radius: 8px;
        color: var(--danger);
        background: rgba(164, 55, 41, 0.08);
        font-size: 13px;
        line-height: 1.6;
      }

      /* ---- Empty State ---- */
      .empty {
        min-height: 300px;
        display: grid;
        place-items: center;
        padding: 30px;
        text-align: center;
        color: var(--muted);
      }

      .empty-mark {
        width: 120px;
        aspect-ratio: 1;
        margin: 0 auto 14px;
        border: 1px solid var(--line);
        border-radius: 50%;
        display: grid;
        place-items: center;
        background:
          linear-gradient(130deg, transparent 48%, rgba(80, 104, 62, 0.22) 49%, transparent 51%),
          radial-gradient(circle at 50% 54%, rgba(80, 104, 62, 0.16), transparent 44%);
        font-family: Georgia, "Times New Roman", serif;
        font-size: 36px;
        color: var(--moss);
      }

      /* ---- Error ---- */
      .error {
        padding: 14px;
        border: 1px solid rgba(164, 55, 41, 0.36);
        border-radius: 8px;
        color: var(--danger);
        background: rgba(164, 55, 41, 0.08);
        line-height: 1.6;
      }

      /* ---- Placeholder Module ---- */
      .placeholder-module {
        min-height: 400px;
        display: grid;
        place-items: center;
        text-align: center;
        padding: 60px 20px;
      }

      .placeholder-module .placeholder-icon {
        width: 100px;
        height: 100px;
        margin: 0 auto 20px;
        border: 2px dashed var(--line);
        border-radius: 50%;
        display: grid;
        place-items: center;
        background: var(--fern);
        font-size: 40px;
        color: var(--moss);
      }

      .placeholder-module h2 {
        margin: 0 0 10px;
        font-size: 24px;
        color: var(--moss-dark);
      }

      .placeholder-module p {
        margin: 0;
        color: var(--muted);
        font-size: 15px;
        line-height: 1.6;
        max-width: 420px;
      }

      /* ---- Loading ---- */
      .loading-overlay {
        display: grid;
        place-items: center;
        padding: 40px;
        text-align: center;
        color: var(--muted);
      }

      .spinner {
        width: 40px;
        height: 40px;
        margin: 0 auto 14px;
        border: 3px solid var(--line);
        border-top-color: var(--moss);
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }

      @keyframes spin { to { transform: rotate(360deg); } }

      /* ---- Responsive ---- */
      @media (max-width: 860px) {
        .topbar { display: grid; }

        .analysis-layout {
          grid-template-columns: 1fr;
        }

        .mini-grid {
          grid-template-columns: 1fr 1fr;
        }

        #amap-container, .map-placeholder {
          height: 280px;
        }

        .weather-grid {
          grid-template-columns: 1fr 1fr;
        }
      }

      @media (max-width: 520px) {
        .app-frame { width: min(100% - 20px, 1280px); }
        .shell { padding-top: 18px; }

        .metrics { grid-template-columns: 1fr 1fr; }
        .mini-grid { grid-template-columns: 1fr; }
        .module-tab { padding: 10px 16px; font-size: 13px; }
        .weather-grid { grid-template-columns: 1fr; }
        .date-picker-row { flex-direction: column; align-items: stretch; }
        .date-picker-row input[type="date"] { width: 100%; }
        .day-timeline { grid-auto-columns: minmax(240px, 82vw); }
        .guide-weather-stats { grid-template-columns: 1fr; }
      }

      /* ---- Guide Form ---- */
      .guide-form {
        margin-top: 20px;
        padding: 20px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(255, 250, 240, 0.86);
        box-shadow: var(--shadow);
      }

      .guide-form-title {
        margin: 0 0 16px;
        font-size: 13px;
        color: var(--moss-dark);
        font-weight: 900;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .guide-form-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 16px;
      }

      .form-field label {
        display: block;
        font-size: 12px;
        font-weight: 800;
        color: var(--muted);
        text-transform: uppercase;
        margin-bottom: 6px;
      }

      .form-field input,
      .form-field select,
      .form-field textarea {
        width: 100%;
        padding: 10px 12px;
        border: 1px solid #cfc5ae;
        border-radius: 6px;
        background: #fffcf4;
        font-size: 14px;
        color: var(--ink);
      }

      .form-field input:focus,
      .form-field select:focus,
      .form-field textarea:focus {
        border-color: var(--moss);
        box-shadow: 0 0 0 3px rgba(80, 104, 62, 0.14);
        outline: none;
      }

      .form-field textarea { resize: vertical; min-height: 60px; }

      .btn-generate {
        margin-top: 16px;
        width: 100%;
        padding: 14px;
        border: none;
        border-radius: 8px;
        background: var(--moss-dark);
        color: #fff9e8;
        font-size: 16px;
        font-weight: 900;
        cursor: pointer;
        transition: background 0.2s;
      }

      .btn-generate:hover { background: #1c2818; }
      .btn-generate:disabled { opacity: 0.5; cursor: wait; }

      .guide-actions {
        display: flex;
        gap: 10px;
        align-items: stretch;
        margin-top: 16px;
      }

      .guide-actions .btn-generate {
        margin-top: 0;
        flex: 2;
      }

      .btn-llm-test {
        flex: 1;
        min-width: 150px;
        padding: 14px;
        border: 1px solid rgba(80, 104, 62, 0.32);
        border-radius: 8px;
        background: #fffcf4;
        color: var(--moss-dark);
        font-size: 14px;
        font-weight: 900;
        cursor: pointer;
        transition: background 0.2s, border-color 0.2s;
      }

      .btn-llm-test:hover {
        background: rgba(223, 232, 202, 0.38);
        border-color: var(--moss);
      }

      .btn-llm-test:disabled {
        opacity: 0.55;
        cursor: wait;
      }

      .llm-test-status {
        display: none;
        margin-top: 10px;
        padding: 10px 12px;
        border-radius: 8px;
        font-size: 13px;
        line-height: 1.5;
      }

      .llm-test-status.show { display: block; }
      .llm-test-status.ok {
        border: 1px solid rgba(80, 104, 62, 0.25);
        background: rgba(223, 232, 202, 0.38);
        color: var(--moss-dark);
      }
      .llm-test-status.fail {
        border: 1px solid rgba(164, 55, 41, 0.24);
        background: rgba(164, 55, 41, 0.06);
        color: var(--danger);
      }

      @media (max-width: 640px) {
        .guide-actions {
          flex-direction: column;
        }

        .btn-llm-test {
          width: 100%;
        }
      }

      /* ---- Guide Sections ---- */
      .guide-container { display: grid; gap: 24px; }

      .guide-section {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(255, 250, 240, 0.86);
        box-shadow: var(--shadow);
        overflow: hidden;
      }

      .guide-section-header {
        padding: 12px 16px;
        background: linear-gradient(135deg, rgba(80, 104, 62, 0.12), rgba(244, 198, 90, 0.10));
        border-bottom: 1px solid var(--line);
      }

      .guide-section-header h3 {
        margin: 0;
        font-size: 13px;
        font-weight: 900;
        color: var(--moss-dark);
        letter-spacing: 0.06em;
        text-transform: uppercase;
      }

      .guide-section-body { padding: 16px; }

      /* ---- Day Timeline ---- */
      .day-timeline {
        display: grid;
        grid-auto-flow: column;
        grid-auto-columns: minmax(280px, 360px);
        gap: 14px;
        overflow-x: auto;
        overflow-y: hidden;
        padding: 2px 2px 12px;
        scroll-snap-type: x proximity;
      }

      .day-card {
        min-width: 0;
        padding: 16px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fffcf4;
        scroll-snap-align: start;
      }

      .day-card-head {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 8px;
      }

      .day-badge {
        flex: 0 0 auto;
        min-width: 58px;
        padding: 5px 9px;
        border-radius: 999px;
        background: var(--moss-dark);
        color: #fff;
        font-size: 12px;
        font-weight: 900;
        text-align: center;
      }

      .day-card h4 {
        margin: 0 0 8px;
        font-size: 16px;
        color: var(--moss-dark);
      }

      .day-meta { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 8px; }
      .day-meta span { font-size: 13px; color: var(--muted); }
      .day-meta span strong { color: var(--ink); }

      .day-segments {
        margin: 0 0 8px;
        padding-left: 18px;
        font-size: 13px;
        color: var(--muted);
        line-height: 1.7;
      }

      .day-lodging {
        padding: 6px 10px;
        border-radius: 6px;
        background: rgba(223,232,202,0.3);
        font-size: 13px;
        margin-bottom: 8px;
      }

      .day-notes {
        font-size: 12px;
        color: var(--muted);
        line-height: 1.6;
      }

      .itinerary-notes {
        margin-top: 12px;
        font-size: 12px;
        color: var(--muted);
        line-height: 1.6;
      }

      /* ---- Transport Options ---- */
      .transport-options { display: grid; gap: 14px; }

      .transport-selector {
        display: flex;
        gap: 8px;
        overflow-x: auto;
        padding-bottom: 6px;
      }

      .transport-choice {
        flex: 0 0 auto;
        min-width: 148px;
        max-width: 220px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fffcf4;
        color: var(--moss-dark);
        padding: 10px 12px;
        text-align: left;
        cursor: pointer;
        display: grid;
        gap: 4px;
      }

      .transport-choice:hover { border-color: var(--moss); background: rgba(223,232,202,0.28); }

      .transport-choice.active {
        border-color: var(--moss-dark);
        background: var(--moss-dark);
        color: #fff9e8;
      }

      .transport-choice-title {
        font-size: 13px;
        font-weight: 900;
      }

      .transport-choice-meta {
        color: inherit;
        opacity: 0.78;
        font-size: 11px;
        line-height: 1.45;
      }

      .transport-option {
        padding: 14px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fffcf4;
      }

      .transport-option-panel { display: none; }
      .transport-option-panel.active { display: block; }

      .transport-option h4 {
        margin: 0 0 8px;
        font-size: 15px;
        color: var(--moss-dark);
      }

      .transport-meta { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 10px; }
      .transport-meta span { font-size: 13px; color: var(--muted); }
      .transport-meta span strong { color: var(--ink); }

      .transport-steps { margin: 0; padding-left: 18px; font-size: 13px; color: var(--muted); line-height: 1.8; }

      .transport-tip {
        margin-top: 8px;
        padding: 6px 10px;
        border-radius: 6px;
        background: rgba(244, 198, 90, 0.12);
        font-size: 12px;
        color: var(--clay);
      }

      .guide-weather-summary {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
        gap: 10px;
        margin-bottom: 14px;
      }

      .guide-weather-chip {
        padding: 10px 12px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fffcf4;
      }

      .guide-weather-chip span {
        display: block;
        color: var(--muted);
        font-size: 11px;
        font-weight: 800;
        text-transform: uppercase;
      }

      .guide-weather-chip strong {
        display: block;
        margin-top: 4px;
        color: var(--ink);
        font-size: 15px;
      }

      .guide-weather-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
        gap: 12px;
      }

      .guide-weather-card {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fffcf4;
        overflow: hidden;
      }

      .guide-weather-card.has-risk {
        border-color: rgba(166, 83, 43, 0.52);
        background: rgba(244, 198, 90, 0.07);
      }

      .guide-weather-card-head {
        padding: 12px 14px;
        border-bottom: 1px solid var(--line);
        display: flex;
        justify-content: space-between;
        gap: 10px;
        align-items: start;
      }

      .guide-weather-date {
        font-weight: 900;
        color: var(--moss-dark);
        font-size: 14px;
      }

      .guide-weather-source {
        flex-shrink: 0;
        color: var(--muted);
        font-size: 11px;
        font-weight: 800;
      }

      .guide-weather-card-body {
        padding: 12px 14px 14px;
        display: grid;
        gap: 10px;
      }

      .guide-weather-text {
        color: var(--ink);
        font-size: 15px;
        font-weight: 800;
      }

      .guide-weather-detail {
        color: var(--muted);
        font-size: 13px;
        line-height: 1.65;
      }

      .guide-weather-stats {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
      }

      .guide-weather-stat {
        padding: 8px 10px;
        border-radius: 6px;
        background: rgba(223,232,202,0.28);
        font-size: 12px;
        color: var(--muted);
      }

      .guide-weather-stat strong {
        display: block;
        margin-top: 2px;
        color: var(--ink);
        font-size: 13px;
      }

      .guide-weather-risks {
        margin: 0;
        padding-left: 18px;
        color: var(--clay);
        font-size: 12px;
        line-height: 1.6;
      }

      .decision-notes {
        display: grid;
        gap: 8px;
      }

      .decision-note {
        padding: 10px 12px;
        border: 1px solid rgba(166, 83, 43, 0.24);
        border-radius: 8px;
        background: rgba(244, 198, 90, 0.12);
        color: var(--clay);
        font-size: 13px;
        line-height: 1.55;
      }

      .reference-grid {
        display: grid;
        gap: 12px;
      }

      .reference-item {
        padding: 12px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fffcf4;
      }

      .reference-item h4 {
        margin: 0 0 6px;
        color: var(--moss-dark);
        font-size: 15px;
      }

      .reference-item p {
        margin: 0;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.65;
      }

      .reference-link {
        display: inline-block;
        margin-top: 6px;
        color: var(--moss-dark);
        font-size: 12px;
        font-weight: 800;
      }

      .reference-list {
        margin: 8px 0 0;
        padding-left: 18px;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.7;
      }

      /* ---- Gear Checklist ---- */
      .gear-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 16px; }

      .gear-category {
        padding: 14px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fffcf4;
      }

      .gear-category h4 {
        margin: 0 0 10px;
        font-size: 14px;
        color: var(--moss-dark);
      }

      .gear-item {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 4px 0;
        font-size: 14px;
      }

      .gear-item input[type="checkbox"] {
        accent-color: var(--moss);
        width: 16px;
        height: 16px;
      }

      /* ---- Safety Warnings ---- */
      .safety-warning {
        padding: 12px 14px;
        border: 1px solid rgba(164, 55, 41, 0.24);
        border-radius: 8px;
        background: rgba(164, 55, 41, 0.06);
        margin-bottom: 10px;
        font-size: 14px;
        line-height: 1.6;
      }

      .risk-point {
        display: flex;
        gap: 12px;
        padding: 12px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fffcf4;
        margin-bottom: 10px;
      }

      .risk-severity-badge {
        padding: 4px 10px;
        border-radius: 999px;
        font-size: 11px;
        font-weight: 900;
        color: #fff9e8;
        flex-shrink: 0;
      }

      .risk-severity-badge.low { background: var(--moss); }
      .risk-severity-badge.medium { background: var(--clay); }
      .risk-severity-badge.high { background: var(--danger); }

      .risk-detail { flex: 1; }
      .risk-detail p { margin: 0 0 4px; font-size: 14px; }
      .risk-detail .risk-mitigation { color: var(--muted); font-size: 13px; }

      /* ---- Full-screen Loading Overlay ---- */
      .guide-loading-overlay {
        position: fixed;
        inset: 0;
        background: rgba(255, 250, 240, 0.96);
        display: grid;
        place-items: center;
        z-index: 1000;
        backdrop-filter: blur(8px);
      }

      .guide-loading-content {
        text-align: left;
        max-width: 760px;
        width: 90%;
        max-height: 88vh;
        overflow: auto;
      }

      .guide-loading-content h3 {
        margin: 0 0 8px;
        font-size: 22px;
        color: var(--moss-dark);
        text-align: center;
      }

      .guide-loading-subtitle {
        margin: 0 0 24px;
        font-size: 13px;
        color: var(--muted);
        text-align: center;
      }

      .guide-progress-bar-wrap {
        width: 100%;
        height: 8px;
        border-radius: 4px;
        background: var(--line);
        overflow: hidden;
        margin-bottom: 10px;
      }

      .guide-progress-bar {
        height: 100%;
        border-radius: 4px;
        background: linear-gradient(90deg, var(--moss), var(--moss-dark));
        transition: width 0.6s ease;
        position: relative;
      }

      .guide-progress-bar::after {
        content: '';
        position: absolute;
        inset: 0;
        background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
        animation: shimmer 1.5s infinite;
      }

      @keyframes shimmer {
        0% { transform: translateX(-100%); }
        100% { transform: translateX(100%); }
      }

      .guide-progress-pct {
        font-size: 12px;
        color: var(--muted);
        margin-bottom: 24px;
        font-weight: 700;
        font-variant-numeric: tabular-nums;
        text-align: center;
      }

      .guide-loading-elapsed {
        margin-top: 20px;
        font-size: 12px;
        color: var(--line);
        font-variant-numeric: tabular-nums;
        text-align: center;
      }

      .guide-loading-grid {
        display: grid;
        grid-template-columns: minmax(220px, 0.8fr) minmax(300px, 1.2fr);
        gap: 22px;
        align-items: start;
      }

      .guide-loading-stages { text-align: left; margin-top: 8px; }

      .guide-loading-stages .stage {
        padding: 10px 0;
        font-size: 14px;
        color: var(--line);
        transition: color 0.4s, font-weight 0.4s, opacity 0.4s;
        display: flex;
        align-items: center;
        gap: 10px;
        opacity: 0.5;
      }

      .guide-loading-stages .stage.active {
        color: var(--moss-dark);
        font-weight: 700;
        opacity: 1;
      }

      .guide-loading-stages .stage.done {
        color: var(--moss);
        opacity: 0.8;
      }

      .stage-icon {
        width: 22px;
        height: 22px;
        border-radius: 50%;
        display: grid;
        place-items: center;
        font-size: 11px;
        flex-shrink: 0;
        border: 2px solid var(--line);
        color: var(--line);
        transition: all 0.4s;
      }

      .stage.active .stage-icon {
        border-color: var(--moss);
        background: var(--fern);
        color: var(--moss-dark);
        animation: pulse-icon 1.5s ease infinite;
      }

      .stage.done .stage-icon {
        border-color: var(--moss);
        background: var(--moss);
        color: #fff;
      }

      @keyframes pulse-icon {
        0%, 100% { box-shadow: 0 0 0 0 rgba(80,104,62,0.3); }
        50% { box-shadow: 0 0 0 6px rgba(80,104,62,0); }
      }

      .agent-trace-panel {
        border: 1px solid rgba(80, 104, 62, 0.18);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.58);
        padding: 14px;
        min-height: 270px;
      }

      .agent-trace-header {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 12px;
      }

      .agent-trace-header strong {
        color: var(--moss-dark);
        font-size: 14px;
      }

      .agent-trace-header span {
        color: var(--muted);
        font-size: 12px;
      }

      .agent-trace-list {
        display: grid;
        gap: 10px;
        max-height: 360px;
        overflow: auto;
        padding-right: 4px;
      }

      .agent-trace-item {
        display: grid;
        grid-template-columns: 18px 1fr;
        gap: 10px;
        padding: 10px;
        border: 1px solid rgba(47, 63, 37, 0.1);
        border-radius: 8px;
        background: rgba(255, 252, 244, 0.82);
      }

      .agent-trace-dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        margin-top: 5px;
        background: var(--moss);
      }

      .agent-trace-item.running .agent-trace-dot {
        animation: pulse-icon 1.5s ease infinite;
      }

      .agent-trace-item.skipped .agent-trace-dot { background: var(--line); }
      .agent-trace-item.fallback .agent-trace-dot,
      .agent-trace-item.warning .agent-trace-dot { background: var(--clay); }

      .agent-trace-title {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 8px;
        margin-bottom: 3px;
        font-size: 13px;
        font-weight: 800;
        color: var(--moss-dark);
      }

      .agent-trace-badge {
        border-radius: 999px;
        background: rgba(80,104,62,0.12);
        color: var(--moss-dark);
        padding: 2px 7px;
        font-size: 10px;
        font-weight: 900;
        text-transform: uppercase;
      }

      .agent-trace-detail {
        color: var(--muted);
        font-size: 12px;
        line-height: 1.55;
      }

      .agent-trace-rationale {
        margin-top: 6px;
        color: #695f4f;
        font-size: 12px;
        line-height: 1.55;
      }

      @media (max-width: 760px) {
        .guide-loading-grid {
          grid-template-columns: 1fr;
        }

        .agent-trace-panel {
          min-height: 0;
        }
      }

      /* ---- POI Tabs ---- */
      .poi-tabs {
        display: flex;
        gap: 0;
        border-bottom: 1px solid var(--line);
        margin-bottom: 14px;
      }

      .poi-tab {
        padding: 8px 16px;
        border: none;
        background: none;
        color: var(--muted);
        font-size: 13px;
        font-weight: 700;
        cursor: pointer;
        border-bottom: 2px solid transparent;
      }

      .poi-tab.active { color: var(--moss-dark); border-bottom-color: var(--moss-dark); }
      .poi-tab:hover { color: var(--moss-dark); }

      .guide-poi-map-wrap {
        display: grid;
        gap: 10px;
      }

      .poi-workbench {
        display: grid;
        grid-template-columns: minmax(320px, 1.15fr) minmax(280px, 0.85fr);
        gap: 16px;
        align-items: stretch;
      }

      .poi-side-panel {
        min-width: 0;
        display: grid;
        grid-template-rows: auto 1fr;
        gap: 12px;
      }

      #guide-poi-map {
        min-height: 320px;
        border: 1px solid var(--line);
        border-radius: 8px;
        overflow: hidden;
        background: #f3efe1;
      }

      .guide-poi-map-placeholder {
        min-height: 180px;
        display: grid;
        place-items: center;
        border: 1px dashed var(--line);
        border-radius: 8px;
        color: var(--muted);
        background: rgba(255,252,244,0.72);
        font-size: 13px;
        text-align: center;
        padding: 18px;
      }

      .poi-map-filters {
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
      }

      .poi-map-filter {
        border: 1px solid var(--line);
        border-radius: 999px;
        background: #fffcf4;
        color: var(--muted);
        padding: 6px 12px;
        font-size: 12px;
        font-weight: 800;
        cursor: pointer;
      }

      .poi-map-filter.active {
        color: #fff;
        border-color: var(--moss-dark);
        background: var(--moss-dark);
      }

      .poi-list { display: grid; gap: 8px; }

      .poi-item {
        display: flex;
        gap: 10px;
        padding: 10px;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: #fffcf4;
        transition: border-color 0.18s ease, background 0.18s ease, transform 0.18s ease;
      }

      .poi-item.has-coordinate { cursor: pointer; }
      .poi-item.has-coordinate:hover,
      .poi-item.active {
        border-color: var(--moss);
        background: rgba(223,232,202,0.35);
        transform: translateY(-1px);
      }

      .poi-item .poi-name { font-weight: 700; font-size: 14px; }
      .poi-item .poi-detail { font-size: 12px; color: var(--muted); margin-top: 2px; }
      .poi-item .poi-dist { font-size: 11px; color: var(--clay); font-weight: 700; flex-shrink: 0; }

      /* ---- Recommendations ---- */
      .rec-list { padding-left: 20px; }
      .rec-list li { padding: 4px 0; font-size: 14px; line-height: 1.7; }

      /* ---- Back Button ---- */
      .btn-back {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 10px 18px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fffcf4;
        color: var(--moss-dark);
        font-size: 14px;
        font-weight: 700;
        cursor: pointer;
        transition: background 0.2s;
      }

      .btn-back:hover { background: var(--fern); }

      /* ---- Guide Summary ---- */
      .guide-summary {
        padding: 16px;
        font-size: 15px;
        line-height: 1.8;
        color: var(--ink);
      }

      @media (max-width: 980px) {
        .app-frame {
          width: min(100% - 24px, 760px);
          grid-template-columns: 1fr;
        }

        .app-frame.history-collapsed {
          grid-template-columns: 1fr;
        }

        .history-sidebar {
          position: static;
          max-height: 320px;
          margin-top: 18px;
        }

        .app-frame.history-collapsed .history-sidebar {
          padding: 18px;
        }

        .app-frame.history-collapsed .history-head {
          display: flex;
          justify-items: initial;
        }

      .app-frame.history-collapsed .history-title-wrap h2,
      .app-frame.history-collapsed .history-new,
      .app-frame.history-collapsed .history-clear,
      .app-frame.history-collapsed .history-list {
        display: grid;
      }

      .app-frame.history-collapsed .history-title-wrap h2,
      .app-frame.history-collapsed .history-new,
      .app-frame.history-collapsed .history-clear {
        display: block;
      }

        .app-frame.history-collapsed .history-toggle {
          transform: rotate(180deg);
        }

        .poi-workbench {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="app-frame">
      <section class="history-sidebar" aria-label="历史攻略">
        <div class="history-head">
          <div class="history-title-wrap">
            <span class="history-mark" aria-hidden="true">T</span>
            <h2>历史攻略</h2>
          </div>
          <div class="history-actions">
            <button class="history-new" id="history-new-route" type="button">新路线</button>
            <button class="history-clear" id="history-clear" type="button">清空</button>
            <button class="history-toggle" id="history-toggle" type="button" aria-label="收起历史攻略" aria-expanded="true" title="收起历史攻略">‹</button>
          </div>
        </div>
        <div class="history-list" id="history-list">
          <div class="history-empty">生成攻略后会自动保存在这里。</div>
        </div>
      </section>

      <main class="shell">
      <header class="topbar">
        <div class="brand">
          <div class="eyebrow">Trailer</div>
          <h1>徒步攻略助手</h1>
          <p class="subtitle">上传已有路线，或让系统为你规划 — 两种方式，一份完整攻略。</p>
        </div>
        <div id="health" class="status-pill">检查服务中</div>
      </header>

      <!-- Module Tabs -->
      <nav class="module-tabs">
        <button class="module-tab active" data-module="parse">上传路线</button>
        <button class="module-tab disabled" data-module="plan">规划路线 <span class="badge-soon">开发中</span></button>
      </nav>

      <!-- ========== Module 1: Route Parsing ========== -->
      <div id="module-parse" class="module-content active">
        <!-- Upload Area -->
        <div class="panel" style="margin-bottom: 0;">
          <div id="upload-zone" class="upload-zone">
            <div class="upload-icon">⬆</div>
            <h3>上传 KML 轨迹文件</h3>
            <p>拖拽文件到此处，或点击选择文件<br>支持两步路、奥维地图等 App 导出的 KML 格式</p>
            <input id="route_file" type="file" accept=".kml,application/vnd.google-earth.kml+xml" />
          </div>
          <div id="file-info" class="file-info">
            <div class="file-icon">K</div>
            <div class="file-name" id="file-name-display">—</div>
            <div class="file-size" id="file-size-display">—</div>
            <button class="btn-remove" id="btn-remove-file" title="移除文件">✕</button>
          </div>
        </div>

        <!-- Results Area -->
        <div id="parse-results">
          <div class="empty" id="parse-empty">
            <div>
              <div class="empty-mark">△</div>
              <h2>等待上传</h2>
              <p>请上传 KML 轨迹文件，系统将自动解析并展示路线数据。</p>
            </div>
          </div>
        </div>
      </div>

      <!-- ========== Module 2: Route Planning (Coming Soon) ========== -->
      <div id="module-plan" class="module-content">
        <div class="panel">
          <div class="placeholder-module">
            <div class="placeholder-icon">🗺</div>
            <h2>智能路线规划</h2>
            <p>只需填写目的地和出行偏好，系统将为你规划当地徒步路线，并生成完整攻略。<br>此功能正在开发中，敬请期待。</p>
          </div>
        </div>
      </div>
      </main>
    </div>

    <script>
      // ---- DOM refs ----
      const healthEl = document.querySelector("#health");
      const uploadZone = document.querySelector("#upload-zone");
      const fileInput = document.querySelector("#route_file");
      const fileInfoEl = document.querySelector("#file-info");
      const fileNameDisplay = document.querySelector("#file-name-display");
      const fileSizeDisplay = document.querySelector("#file-size-display");
      const btnRemoveFile = document.querySelector("#btn-remove-file");
      const parseResults = document.querySelector("#parse-results");
      const historyListEl = document.querySelector("#history-list");
      const historyNewRouteBtn = document.querySelector("#history-new-route");
      const historyClearBtn = document.querySelector("#history-clear");
      const appFrameEl = document.querySelector(".app-frame");
      const historyToggleBtn = document.querySelector("#history-toggle");

      // ---- AMap state ----
      let amapInstance = null;
      let guidePoiMap = null;
      let guidePoiInfoWindow = null;
      let guidePoiMarkers = {};
      let guidePoiActiveFilters = new Set(["lodging", "food"]);
      let amapKey = null;
      let amapLoaded = false;
      let elevationChart = null;
      let lastKmlData = null;  // Store parsed KML data for weather queries
      let lastKmlFile = null;   // Store the original KML file for guide generation
      let lastParseHTML = null; // Store parse results HTML for back navigation
      const HISTORY_KEY = "trailer.guideHistory.v1";
      const HISTORY_COLLAPSED_KEY = "trailer.historyCollapsed.v1";
      const ROUTE_COLORS = ["#50683e", "#a6532b", "#2e6b9e", "#7b4fa6", "#c47a1e"];
      const EMPTY_PARSE_HTML = `<div class="empty" id="parse-empty"><div><div class="empty-mark">△</div><h2>等待上传</h2><p>请上传 KML 轨迹文件，系统将自动解析并展示路线数据。</p></div></div>`;

      // ---- Module Tabs ----
      document.querySelectorAll(".module-tab").forEach(tab => {
        tab.addEventListener("click", () => {
          if (tab.classList.contains("disabled")) return;
          document.querySelectorAll(".module-tab").forEach(t => t.classList.remove("active"));
          document.querySelectorAll(".module-content").forEach(c => c.classList.remove("active"));
          tab.classList.add("active");
          document.querySelector(`#module-${tab.dataset.module}`).classList.add("active");
        });
      });

      // ---- Health Check ----
      async function checkHealth() {
        try {
          const r = await fetch("/health");
          if (!r.ok) throw new Error();
          healthEl.textContent = "后端在线";
        } catch {
          healthEl.textContent = "后端未连接";
        }
      }

      // ---- AMap Config ----
      async function loadMapConfig() {
        try {
          const res = await fetch("/api/v1/config/map");
          if (res.ok) {
            const data = await res.json();
            amapKey = data.amap_web_key || null;
          }
        } catch { amapKey = null; }
      }

      function loadAmapScript(key) {
        return new Promise((resolve, reject) => {
          if (amapLoaded) { resolve(); return; }
          const s = document.createElement("script");
          s.src = `https://webapi.amap.com/maps?v=2.0&key=${encodeURIComponent(key)}`;
          s.onload = () => { amapLoaded = true; resolve(); };
          s.onerror = reject;
          document.head.appendChild(s);
        });
      }

      async function ensureMap() {
        if (!amapKey) return false;
        await loadAmapScript(amapKey);
        if (!amapInstance) {
          amapInstance = new AMap.Map("amap-container", {
            zoom: 11,
            mapStyle: "amap://styles/whitesmoke",
          });
        }
        return true;
      }

      // ---- File Handling ----
      function formatFileSize(bytes) {
        if (bytes < 1024) return bytes + " B";
        if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + " KB";
        return (bytes / (1024 * 1024)).toFixed(1) + " MB";
      }

      function showFileInfo(file) {
        fileNameDisplay.textContent = file.name;
        fileSizeDisplay.textContent = formatFileSize(file.size);
        fileInfoEl.classList.add("show");
      }

      function hideFileInfo() {
        fileInfoEl.classList.remove("show");
        fileInput.value = "";
      }

      // Drag & Drop
      uploadZone.addEventListener("dragover", e => { e.preventDefault(); uploadZone.classList.add("dragging"); });
      uploadZone.addEventListener("dragleave", () => uploadZone.classList.remove("dragging"));
      uploadZone.addEventListener("drop", e => {
        e.preventDefault();
        uploadZone.classList.remove("dragging");
        const file = e.dataTransfer.files[0];
        if (file && file.name.endsWith(".kml")) {
          handleFile(file);
        }
      });

      fileInput.addEventListener("change", () => {
        if (fileInput.files.length) handleFile(fileInput.files[0]);
      });

      btnRemoveFile.addEventListener("click", () => {
        resetRouteWorkspace();
      });

      // ---- Core: Parse KML ----
      async function handleFile(file) {
        showFileInfo(file);
        lastKmlFile = file;
        parseResults.innerHTML = `<div class="loading-overlay"><div class="spinner"></div><p>正在解析 KML 文件...</p></div>`;

        const body = new FormData();
        body.append("route_file", file);

        let data;
        try {
          const res = await fetch("/api/v1/kml-preview", { method: "POST", body });
          if (!res.ok) {
            let detail = res.statusText;
            try { const err = await res.json(); detail = err.detail || detail; } catch(_) {}
            renderParseError(detail);
            return;
          }
          data = await res.json();
        } catch (e) {
          renderParseError(`网络请求失败: ${e.message}`);
          return;
        }

        renderParseResults(data);
      }

      // ---- Render Error ----
      function renderParseError(msg) {
        parseResults.innerHTML = `<div style="margin-top:20px"><div class="error"><strong>解析失败</strong><br>${escapeHtml(msg)}<br><span style="font-size:12px;margin-top:6px;display:block">请确认 KML 中包含 LineString 或 gx:Track 轨迹</span></div></div>`;
      }

      // ---- Render Results ----
      function renderParseResults(data) {
        const totalPoints = data.routes.reduce((s, r) => s + r.coordinates.length, 0);
        const totalDistance = data.routes.reduce((s, r) => s + (r.distance_km || 0), 0);
        const allElevations = data.routes.flatMap(r => r.coordinates.map(c => c.elevation_m)).filter(v => v != null);
        const hasElevation = allElevations.length > 0;
        const minElev = data.routes.reduce((s, r) => r.min_elevation_m != null ? Math.min(s, r.min_elevation_m) : s, Infinity);
        const maxElev = data.routes.reduce((s, r) => r.max_elevation_m != null ? Math.max(s, r.max_elevation_m) : s, -Infinity);
        const totalAscent = data.routes.reduce((s, r) => s + (r.ascent_m || 0), 0);
        const totalDescent = data.routes.reduce((s, r) => s + (r.descent_m || 0), 0);
        const totalDuration = data.routes.reduce((s, r) => s + (r.estimated_duration_hours || 0), 0);

        let html = "";

        // Metrics row
        html += `<div class="metrics">`;
        html += metricCard("路线数", `${data.routes.length} 条`, data.routes.length > 1 ? "多段轨迹" : "");
        html += metricCard("总距离", totalDistance > 0 ? `${totalDistance.toFixed(2)} km` : "—", "");
        html += metricCard("坐标点数", `${totalPoints}`, "");
        if (hasElevation && minElev < Infinity && maxElev > -Infinity) {
          html += metricCard("海拔范围", `${minElev.toFixed(0)} - ${maxElev.toFixed(0)} m`, "");
          html += metricCard("累计爬升", `${totalAscent.toFixed(0)} m`, "");
          html += metricCard("累计下降", `${totalDescent.toFixed(0)} m`, "");
        }
        if (totalDuration > 0) {
          html += metricCard("预估耗时", `${totalDuration.toFixed(1)} h`, "基于 4km/h + 爬升修正");
        }
        html += `</div>`;

        // Two-column: Map + Elevation
        html += `<div class="analysis-layout">`;

        // Map
        html += `<div class="map-panel">`;
        html += `<div class="map-panel-header"><p>路线地图</p><span id="map-status"></span></div>`;
        html += `<div id="amap-container"></div>`;
        html += `<div id="map-legend" class="map-route-legend" style="display:none"></div>`;
        html += `</div>`;

        // Elevation profile
        html += `<div class="elevation-panel">`;
        html += `<div class="elevation-panel-header"><p>海拔剖面</p><span id="elev-status">${hasElevation ? allElevations.length + ' 个海拔点' : '无海拔数据'}</span></div>`;
        if (hasElevation) {
          html += `<div class="elevation-chart-wrap"><canvas id="elevation-canvas"></canvas></div>`;
        } else {
          html += `<div class="elevation-placeholder"><div><div style="font-size:28px;margin-bottom:8px;opacity:0.4">📈</div>该 KML 文件不包含海拔数据</div></div>`;
        }
        html += `</div>`;

        html += `</div>`;

        // Weather section
        html += renderWeatherSection(data);

        parseResults.innerHTML = html;

        // Store data for weather queries
        lastKmlData = data;

        // Set up default date range (today + 6 days)
        const today = new Date();
        const maxWeatherDate = new Date(today);
        maxWeatherDate.setDate(maxWeatherDate.getDate() + 15);
        const startDateEl = document.querySelector("#weather-start-date");
        const endDateEl = document.querySelector("#weather-end-date");
        if (startDateEl) {
          startDateEl.min = formatDateISO(today);
          startDateEl.max = formatDateISO(maxWeatherDate);
          startDateEl.value = formatDateISO(today);
        }
        if (endDateEl) {
          const end = new Date(today);
          end.setDate(end.getDate() + 6);
          endDateEl.min = formatDateISO(today);
          endDateEl.max = formatDateISO(maxWeatherDate);
          endDateEl.value = formatDateISO(end);
        }

        // Bind weather query button
        const btnQuery = document.querySelector("#btn-query-weather");
        if (btnQuery) {
          btnQuery.addEventListener("click", queryWeather);
        }

        // Post-render: init map
        initMap(data);

        // Post-render: init elevation chart
        if (hasElevation) {
          requestAnimationFrame(() => initElevationChart(data));
        }

        // Append guide generation form
        appendGuideForm(data);
      }

      function metricCard(label, value, sub) {
        return `<div class="metric"><span class="metric-label">${label}</span><strong class="metric-value">${value}</strong>${sub ? `<span class="metric-sub">${sub}</span>` : ""}</div>`;
      }

      function renderRouteCard(route, idx) {
        const color = ROUTE_COLORS[idx % ROUTE_COLORS.length];
        const coords = route.coordinates || [];
        const start = coords[0];
        const end = coords[coords.length - 1];
        const hasElev = coords.some(c => c.elevation_m != null);

        // Use server-computed analysis data when available
        const minE = route.min_elevation_m;
        const maxE = route.max_elevation_m;
        const ascent = route.ascent_m || 0;
        const descent = route.descent_m || 0;
        const distKm = route.distance_km;
        const duration = route.estimated_duration_hours;
        const riskLevel = route.risk_level;
        const riskFactors = route.risk_factors || [];

        const riskBadge = riskLevel === 'high' ? 'badge high' : riskLevel === 'medium' ? 'badge medium' : 'badge';
        const riskLabel = riskLevel === 'high' ? '高风险' : riskLevel === 'medium' ? '中等' : '低风险';

        return `
          <article class="route-card">
            <div class="route-card-head">
              <div>
                <h3><span class="legend-dot" style="background:${color};display:inline-block;width:12px;height:12px;border-radius:50%;vertical-align:middle;margin-right:8px"></span>${escapeHtml(route.name)}</h3>
                <p style="margin:4px 0 0;font-size:13px;color:var(--muted)">${coords.length} 个坐标点${route.track_type ? ' · ' + escapeHtml(route.track_type) : ''}</p>
              </div>
              <span class="${riskBadge}">${riskLabel}</span>
            </div>
            <div class="route-body">
              <div class="mini-grid">
                <div class="mini">距离<strong>${distKm ? distKm.toFixed(2) + ' km' : '—'}</strong></div>
                <div class="mini">耗时<strong>${duration ? duration.toFixed(1) + ' h' : '—'}</strong></div>
                <div class="mini">点数<strong>${coords.length}</strong></div>
                ${hasElev ? `
                  <div class="mini">海拔范围<strong>${minE != null ? minE.toFixed(0) + ' - ' + maxE.toFixed(0) + ' m' : '—'}</strong></div>
                  <div class="mini">累计爬升<strong>${ascent.toFixed(0)} m</strong></div>
                  <div class="mini">累计下降<strong>${descent.toFixed(0)} m</strong></div>
                ` : ''}
                <div class="mini">起点<strong>${formatCoord(start)}</strong></div>
                <div class="mini">终点<strong>${formatCoord(end)}</strong></div>
              </div>
              ${riskFactors.length ? `<ul style="margin:12px 0 0;padding-left:18px;color:var(--muted);line-height:1.7;font-size:13px">${riskFactors.map(f => `<li>${escapeHtml(f)}</li>`).join('')}</ul>` : ''}
              ${route.description ? `<p style="margin:12px 0 0;color:var(--muted);font-size:13px;line-height:1.6">${escapeHtml(route.description)}</p>` : ''}
            </div>
          </article>
        `;
      }

      // ---- Init Map ----
      async function initMap(data) {
        const ok = await ensureMap();
        const mapStatusEl = document.querySelector("#map-status");
        const mapLegendEl = document.querySelector("#map-legend");

        if (!ok) {
          if (mapStatusEl) mapStatusEl.textContent = "无高德 Key";
          const container = document.querySelector("#amap-container");
          if (container) container.innerHTML = `<div class="map-placeholder"><div>地图服务暂不可用</div></div>`;
          return;
        }

        amapInstance.clearMap();
        const allPoints = [];
        const legendHTML = [];

        data.routes.forEach((route, idx) => {
          const color = ROUTE_COLORS[idx % ROUTE_COLORS.length];
          const lnglats = (route.coordinates || []).map(c => [c.lng, c.lat]);
          if (!lnglats.length) return;

          const polyline = new AMap.Polyline({
            path: lnglats,
            strokeColor: color,
            strokeWeight: 4,
            strokeOpacity: 0.9,
            lineJoin: "round",
            lineCap: "round",
          });
          amapInstance.add(polyline);

          // Start / End markers
          if (lnglats.length >= 2) {
            amapInstance.add(new AMap.Marker({
              position: lnglats[0],
              title: `起点: ${route.name}`,
              label: { content: `<div style="background:${color};color:#fff;padding:2px 6px;border-radius:4px;font-size:11px;white-space:nowrap">⚐ 起点</div>`, offset: new AMap.Pixel(-16, -36) },
            }));
            amapInstance.add(new AMap.Marker({
              position: lnglats[lnglats.length - 1],
              title: `终点: ${route.name}`,
              label: { content: `<div style="background:${color};color:#fff;padding:2px 6px;border-radius:4px;font-size:11px;white-space:nowrap">⚑ 终点</div>`, offset: new AMap.Pixel(-16, -36) },
            }));
          }

          allPoints.push(...lnglats);
          legendHTML.push(`<span><i class="legend-dot" style="background:${color}"></i>${escapeHtml(route.name)} (${route.coordinates.length} 点)</span>`);
        });

        if (allPoints.length) amapInstance.setFitView();

        if (mapStatusEl) {
          const total = data.routes.reduce((s, r) => s + r.coordinates.length, 0);
          mapStatusEl.textContent = `${data.routes.length} 条路线 · ${total} 点`;
        }

        if (mapLegendEl && legendHTML.length) {
          mapLegendEl.innerHTML = legendHTML.join("");

        }
      }

      // ---- Init Elevation Chart ----
      function initElevationChart(data) {
        const canvas = document.querySelector("#elevation-canvas");
        if (!canvas) return;

        // Collect all elevation data from all routes
        const datasets = [];
        let globalOffset = 0;

        data.routes.forEach((route, idx) => {
          const coords = route.coordinates || [];
          const hasElev = coords.some(c => c.elevation_m != null);
          if (!hasElev) return;

          const color = ROUTE_COLORS[idx % ROUTE_COLORS.length];
          // Compute cumulative distance for each point
          let cumulativeDist = [0];
          for (let i = 1; i < coords.length; i++) {
            const d = haversineKm(coords[i-1].lat, coords[i-1].lng, coords[i].lat, coords[i].lng);
            cumulativeDist.push(cumulativeDist[i-1] + d);
          }

          // Offset distances for multi-route display
          const distances = cumulativeDist.map(d => +(d + globalOffset).toFixed(3));
          globalOffset = distances[distances.length - 1] || globalOffset;

          const elevations = coords.map(c => c.elevation_m);

          datasets.push({
            label: route.name,
            data: distances.map((d, i) => ({ x: d, y: elevations[i] })),
            borderColor: color,
            backgroundColor: color + "22",
            fill: true,
            tension: 0.3,
            pointRadius: 0,
            pointHoverRadius: 4,
            borderWidth: 2,
          });
        });

        if (!datasets.length) return;

        elevationChart = new Chart(canvas, {
          type: "line",
          data: { datasets },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            interaction: {
              mode: "index",
              intersect: false,
            },
            plugins: {
              legend: { display: datasets.length > 1 },
              tooltip: {
                callbacks: {
                  title: (items) => `距离: ${items[0].parsed.x.toFixed(2)} km`,
                  label: (item) => `${item.dataset.label}: ${item.parsed.y.toFixed(0)} m`,
                },
              },
            },
            scales: {
              x: {
                type: "linear",
                title: { display: true, text: "距离 (km)", font: { size: 12, weight: "bold" } },
                grid: { color: "rgba(216,207,185,0.3)" },
              },
              y: {
                title: { display: true, text: "海拔 (m)", font: { size: 12, weight: "bold" } },
                grid: { color: "rgba(216,207,185,0.3)" },
              },
            },
          },
        });
      }
