      async function queryWeather() {
        if (!lastKmlData || !lastKmlData.routes.length) return;

        const startDate = document.querySelector("#weather-start-date")?.value;
        const endDate = document.querySelector("#weather-end-date")?.value;
        if (!startDate && !endDate) return;

        // Use the midpoint of the first route
        const coords = lastKmlData.routes[0].coordinates;
        const mid = coords[Math.floor(coords.length / 2)];

        const weatherBody = document.querySelector("#weather-body");
        const btnQuery = document.querySelector("#btn-query-weather");

        btnQuery.disabled = true;
        btnQuery.textContent = "查询中...";
        weatherBody.innerHTML = `<div class="weather-loading"><div class="spinner"></div><p>正在获取天气数据...</p></div>`;

        let params = `lat=${mid.lat}&lng=${mid.lng}`;
        if (startDate) params += `&start_date=${startDate}`;
        if (endDate) params += `&end_date=${endDate}`;

        try {
          const res = await fetch(`/api/v1/weather-forecast?${params}`);
          if (!res.ok) {
            let detail = res.statusText;
            try { const err = await res.json(); detail = err.detail || detail; } catch(_) {}
            weatherBody.innerHTML = `<div class="weather-error">天气查询失败: ${escapeHtml(detail)}</div>`;
            return;
          }
          const data = await res.json();
          renderWeatherResults(data);
        } catch (e) {
          weatherBody.innerHTML = `<div class="weather-error">网络请求失败: ${escapeHtml(e.message)}</div>`;
        } finally {
          btnQuery.disabled = false;
          btnQuery.textContent = "查询天气";
        }
      }

      function renderWeatherResults(data) {
        const weatherBody = document.querySelector("#weather-body");
        if (!weatherBody) return;

        const forecasts = data.forecasts || [];
        if (!forecasts.length) {
          const warnings = data.warnings || [];
          const notice = warnings.length
            ? `<div class="weather-notice"><strong>数据提示</strong>${warnings.map(escapeHtml).join('<br>')}</div>`
            : '';
          weatherBody.innerHTML = `${notice}<div class="weather-empty">所选日期范围内暂无天气预报数据</div>`;
          return;
        }

        // Summary: count suitable days
        const suitableDays = forecasts.filter(f => f.suitability_label === '适宜');
        const marginalDays = forecasts.filter(f => f.suitability_label === '一般');
        const unsuitableDays = forecasts.filter(f => f.suitability_label === '不宜');

        let html = '';

        const warnings = data.warnings || [];
        if (warnings.length) {
          html += `<div class="weather-notice"><strong>数据提示</strong>${warnings.map(escapeHtml).join('<br>')}</div>`;
        }

        const sourceLabel = (data.data_sources || []).map(weatherSourceLabel).join('、') || '天气服务';
        const bestDates = data.suitable_dates || suitableDays.map(f => f.date);
        const backupDates = data.marginal_dates || marginalDays.map(f => f.date);
        if (bestDates.length) {
          html += `<div class="weather-recommendation"><strong>优先考虑</strong>${bestDates.map(formatDateCN).join('、')}。数据源：${escapeHtml(sourceLabel)}</div>`;
        } else if (backupDates.length) {
          html += `<div class="weather-recommendation"><strong>备选日期</strong>暂无明确适宜日期，可谨慎评估 ${backupDates.slice(0, 8).map(formatDateCN).join('、')}。数据源：${escapeHtml(sourceLabel)}</div>`;
        } else {
          html += `<div class="weather-notice"><strong>不建议出行</strong>当前区间没有筛出适宜或一般日期，建议调整时间窗口或降低路线强度。</div>`;
        }

        // Summary bar
        html += `<div class="weather-result-summary">`;
        html += `<span class="weather-count">共 ${forecasts.length} 天预报</span>`;
        if (suitableDays.length) html += `<span class="suitability-tag suitable">${suitableDays.length} 天适宜</span>`;
        if (marginalDays.length) html += `<span class="suitability-tag marginal">${marginalDays.length} 天一般</span>`;
        if (unsuitableDays.length) html += `<span class="suitability-tag unsuitable">${unsuitableDays.length} 天不宜</span>`;
        html += `</div>`;

        // Day cards
        html += `<div class="weather-grid">`;
        forecasts.forEach(f => {
          const suitClass = f.suitability_label === '适宜' ? 'suitable' : f.suitability_label === '不宜' ? 'unsuitable' : 'marginal';
          const icon = weatherIcon(f.day_weather);
          html += `
            <div class="weather-card ${suitClass}">
              <div class="weather-date">${formatDateCN(f.date)}</div>
              <div class="weather-icon">${icon}</div>
              <div class="weather-card-main">
                <div class="weather-desc">${escapeHtml(f.day_weather)} → ${escapeHtml(f.night_weather)}</div>
                <div class="weather-card-meta">
                  <span>温度：${escapeHtml(f.night_temp)}°C ~ ${escapeHtml(f.day_temp)}°C</span>
                  <span>风力：${escapeHtml(f.day_wind)}风 ${escapeHtml(f.day_power)}级</span>
                  ${f.precipitation_probability != null ? `<span>降水概率：${escapeHtml(f.precipitation_probability)}%</span>` : ''}
                  ${f.precipitation_mm != null ? `<span>降水量：${escapeHtml(formatMetric(f.precipitation_mm, 'mm'))}</span>` : ''}
                  ${f.wind_gust_kmh != null ? `<span>阵风：${escapeHtml(formatMetric(f.wind_gust_kmh, 'km/h'))}</span>` : ''}
                  ${(f.risk_notes || []).length ? `<span>${escapeHtml(f.risk_notes[0])}</span>` : ''}
                </div>
              </div>
              <span class="suitability-tag ${suitClass}">${escapeHtml(f.suitability_label)}出行</span>
            </div>
          `;
        });
        html += `</div>`;

        weatherBody.innerHTML = html;
      }

      function weatherSourceLabel(source) {
        if (!source) return '天气服务';
        if (source.includes('seasonal')) return 'Open-Meteo 长周期趋势';
        if (source.includes('open-meteo')) return 'Open-Meteo 预报';
        if (source.includes('amap')) return '高德天气';
        return source;
      }

      function formatMetric(value, unit) {
        const number = Number(value);
        if (!Number.isFinite(number)) return `${value} ${unit}`;
        return `${number.toFixed(number % 1 === 0 ? 0 : 1)} ${unit}`;
      }

      function weatherIcon(weather) {
        if (!weather) return '🌤';
        if (weather.includes('晴')) return '☀';
        if (weather.includes('多云')) return '⛅';
        if (weather.includes('阴')) return '☁';
        if (weather.includes('雷')) return '⛈';
        if (weather.includes('雨')) return weather.includes('大') || weather.includes('暴') ? '🌧' : '🌦';
        if (weather.includes('雪')) return '❄';
        if (weather.includes('雾') || weather.includes('霾')) return '🌫';
        if (weather.includes('沙')) return '🌪';
        return '🌤';
      }

      function formatDateISO(date) {
        const y = date.getFullYear();
        const m = String(date.getMonth() + 1).padStart(2, '0');
        const d = String(date.getDate()).padStart(2, '0');
        return `${y}-${m}-${d}`;
      }

      function formatDateCN(dateStr) {
        if (!dateStr) return '';
        const [y, m, d] = dateStr.split('-');
        const days = ['日', '一', '二', '三', '四', '五', '六'];
        const date = new Date(dateStr);
        return `${parseInt(m)}月${parseInt(d)}日 周${days[date.getDay()]}`;
      }

      // ---- Utils ----
      function haversineKm(lat1, lon1, lat2, lon2) {
        const R = 6371;
        const dLat = (lat2 - lat1) * Math.PI / 180;
        const dLon = (lon2 - lon1) * Math.PI / 180;
        const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                  Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                  Math.sin(dLon/2) * Math.sin(dLon/2);
        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
      }

      function formatCoord(point) {
        if (!point) return "—";
        return `${Number(point.lat).toFixed(4)}, ${Number(point.lng || point.lon).toFixed(4)}`;
      }

      function escapeHtml(value) {
        return String(value ?? "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      // ---- Loading Overlay ----
      function showGuideLoadingOverlay() {
        const overlay = document.createElement('div');
        overlay.className = 'guide-loading-overlay';
        overlay.id = 'guide-loading-overlay';

        const stageData = [
          { key: 'route', text: '建立路线候选' },
          { key: 'planner', text: 'Planner 决策工具' },
          { key: 'tool', text: '按需调用工具' },
          { key: 'composer', text: '生成综合攻略' },
          { key: 'reference', text: '补充参考材料' },
        ];

        overlay.innerHTML = `
          <div class="guide-loading-content">
            <h3>正在生成攻略</h3>
            <p class="guide-loading-subtitle">Planner Agent 正在按需调用工具，并把可公开的决策轨迹展示在这里</p>
            <div class="guide-progress-bar-wrap">
              <div class="guide-progress-bar" id="guide-progress-bar" style="width:5%"></div>
            </div>
            <div class="guide-progress-pct" id="guide-progress-pct">5%</div>
            <div class="guide-loading-grid">
              <div class="guide-loading-stages">
                ${stageData.map((s, i) => `
                  <div class="stage${i === 0 ? ' active' : ''}" data-stage="${i}" data-phase="${s.key}">
                    <span class="stage-icon">${i === 0 ? '●' : (i + 1)}</span>
                    <span>${s.text}</span>
                  </div>
                `).join('')}
              </div>
              <div class="agent-trace-panel">
                <div class="agent-trace-header">
                  <strong>Planner Agent 轨迹</strong>
                  <span>决策摘要与工具调用</span>
                </div>
                <div class="agent-trace-list" id="agent-trace-list"></div>
              </div>
            </div>
            <div class="guide-loading-elapsed" id="guide-elapsed">已用时 0 秒</div>
          </div>
        `;
        document.body.appendChild(overlay);

        let currentStage = 0;
        const totalStages = stageData.length;
        const stageProgress = [5, 22, 45, 76, 90]; // progress % at each stage start
        const startTime = Date.now();

        appendGuideAgentTrace({
          phase: 'planner',
          title: '启动 Planner Agent',
          status: 'running',
          detail: '等待后端返回路线、工具决策和攻略生成事件。'
        });

        let progressAnimId;
        let currentPct = 5;
        let targetPct = 5;

        function animateProgress() {
          if (currentPct < targetPct) {
            currentPct = Math.min(currentPct + 0.5, targetPct);
          }
          const bar = document.getElementById('guide-progress-bar');
          const pctEl = document.getElementById('guide-progress-pct');
          if (bar) bar.style.width = currentPct + '%';
          if (pctEl) pctEl.textContent = Math.round(currentPct) + '%';
          progressAnimId = requestAnimationFrame(animateProgress);
          overlay._progressAnimId = progressAnimId;
        }
        progressAnimId = requestAnimationFrame(animateProgress);

        function setStageByPhase(phase) {
          const nextStage = Math.max(0, stageData.findIndex(s => s.key === phase));
          const stages = overlay.querySelectorAll('.stage');
          stages.forEach((stage, idx) => {
            stage.classList.toggle('done', idx < nextStage);
            stage.classList.toggle('active', idx === nextStage);
            const icon = stage.querySelector('.stage-icon');
            if (icon) icon.textContent = idx < nextStage ? '✓' : (idx === nextStage ? '●' : String(idx + 1));
          });
          currentStage = nextStage;
          targetPct = Math.max(targetPct, stageProgress[currentStage] || 5);
        }

        const intervalId = setInterval(() => {
          if (currentStage >= totalStages - 1) {
            targetPct = Math.min(targetPct + 0.6, 96);
          } else {
            targetPct = Math.min(targetPct + 0.25, (stageProgress[currentStage + 1] || 95) - 3);
          }
        }, 900);

        const elapsedId = setInterval(() => {
          const elapsed = Math.floor((Date.now() - startTime) / 1000);
          const elapsedEl = document.getElementById('guide-elapsed');
          if (elapsedEl) elapsedEl.textContent = `已用时 ${elapsed} 秒`;
        }, 1000);

        overlay._intervalId = intervalId;
        overlay._elapsedId = elapsedId;
        overlay._progressAnimId = progressAnimId;
        overlay._setStageByPhase = setStageByPhase;
        overlay._setProgress = (pct) => { targetPct = Math.max(targetPct, Math.min(pct, 98)); };
      }

      function hideGuideLoadingOverlay() {
        const overlay = document.getElementById('guide-loading-overlay');
        if (overlay) {
          clearInterval(overlay._intervalId);
          clearInterval(overlay._elapsedId);
          cancelAnimationFrame(overlay._progressAnimId);
          // Quick finish animation
          const bar = document.getElementById('guide-progress-bar');
          const pctEl = document.getElementById('guide-progress-pct');
          if (bar) bar.style.width = '100%';
          if (pctEl) pctEl.textContent = '100%';
          // Mark all stages done
          overlay.querySelectorAll('.stage').forEach(s => {

      function appendGuideAgentTrace(event) {
        const list = document.getElementById('agent-trace-list');
        const overlay = document.getElementById('guide-loading-overlay');
        if (!list || !event) return;

        if (overlay && overlay._setStageByPhase && event.phase) {
          overlay._setStageByPhase(event.phase);
        }

        const status = event.status || 'completed';
        const phaseLabel = {
          route: 'Route',
          planner: 'Planner',
          tool: event.tool_name || 'Tool',
          composer: 'Composer',
          reference: 'Reference'
        }[event.phase] || (event.phase || 'Agent');
        const rationale = Array.isArray(event.rationale) && event.rationale.length
          ? `<div class="agent-trace-rationale">${event.rationale.map(r => escapeHtml(r)).join('<br>')}</div>`
          : '';

        const item = document.createElement('div');
        item.className = `agent-trace-item ${status}`;
        item.innerHTML = `
          <span class="agent-trace-dot"></span>
          <div>
            <div class="agent-trace-title">
              <span>${escapeHtml(event.title || 'Agent 事件')}</span>
              <span class="agent-trace-badge">${escapeHtml(phaseLabel)}</span>
            </div>
            ${event.detail ? `<div class="agent-trace-detail">${escapeHtml(event.detail)}</div>` : ''}
            ${rationale}
          </div>
        `;
        list.appendChild(item);
        list.scrollTop = list.scrollHeight;

      async function testLLMConnection() {
        const btn = document.getElementById('btn-test-llm');
        const statusEl = document.getElementById('llm-test-status');
        if (!btn || !statusEl) return;

        btn.disabled = true;
        btn.textContent = '测试中...';
        statusEl.className = 'llm-test-status show';
        statusEl.textContent = '正在用最短回复测试 LLM 连接...';

        try {
          const res = await fetch('/api/v1/llm/health', { method: 'GET' });
          if (!res.ok) throw new Error(res.statusText || '请求失败');
          const data = await res.json();
          if (data.ok) {
            const elapsed = data.elapsed_ms != null ? `，耗时 ${data.elapsed_ms} ms` : '';
            const preview = data.reply_preview ? `，回复：${data.reply_preview}` : '';
            statusEl.className = 'llm-test-status show ok';
            statusEl.textContent = `LLM 连接正常（${data.model || '当前模型'}${elapsed}${preview}）`;
          } else {
            statusEl.className = 'llm-test-status show fail';
            statusEl.textContent = `LLM 连接失败：${data.error || '未知错误'}`;
          }
        } catch (e) {
          statusEl.className = 'llm-test-status show fail';
          statusEl.textContent = `LLM 连接测试失败：${e.message}`;
        } finally {
          btn.disabled = false;
          btn.textContent = '测试 LLM 连接';
        }
      }

      // ---- Submit Guide Request ----
      async function submitGuideRequest() {
        if (!lastKmlFile) {
          alert('请先上传 KML 文件');
          return;
        }

        const destination = document.getElementById('guide-destination').value.trim();
        const startCity = document.getElementById('guide-start-city').value.trim();
        const startDate = document.getElementById('guide-start-date').value;
        const endDate = document.getElementById('guide-end-date').value;
        const fitness = document.getElementById('guide-fitness').value;
        const preferences = document.getElementById('guide-preferences').value.trim();
        const routeText = document.getElementById('guide-route-text').value.trim();
        const referenceLinks = document.getElementById('guide-reference-links').value.trim();
        const referenceNotes = document.getElementById('guide-reference-notes').value.trim();

        if (!destination) {
          alert('请填写目的地名称');
          return;
        }

        const btn = document.getElementById('btn-generate-guide');
        btn.disabled = true;
        showGuideLoadingOverlay();

        const body = new FormData();
        body.append('destination', destination);
        if (startCity) body.append('start_city', startCity);
        if (startDate) body.append('start_date', startDate);
        if (endDate) body.append('end_date', endDate);
        if (fitness) body.append('fitness_level', fitness);
        if (preferences) body.append('preferences', preferences);
        if (routeText) body.append('route_text', routeText);
        if (referenceLinks) body.append('reference_links', referenceLinks);
        if (referenceNotes) body.append('reference_notes', referenceNotes);
        body.append('route_file', lastKmlFile);

        try {
          const guideData = await fetchGuideStream(body);
          renderGuideResult(guideData);
        } catch (e) {
          alert('攻略生成失败: ' + e.message);
        } finally {
          hideGuideLoadingOverlay();
          btn.disabled = false;
        }
      }

      async function fetchGuideStream(body) {
        const res = await fetch('/api/v1/hiking-guides/upload/stream', {
          method: 'POST',
          body,
          headers: { 'Accept': 'text/event-stream' }
        });
        if (!res.ok) {
          let detail = res.statusText;
          try { const err = await res.json(); detail = err.detail || detail; } catch(_) {}
          throw new Error(detail);
        }
        if (!res.body) {
          throw new Error('浏览器不支持流式读取，请刷新后重试');
        }

        const reader = res.body.getReader();
        const decoder = new TextDecoder('utf-8');
        let buffer = '';
        let finalGuide = null;

        while (true) {
          const { value, done } = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, { stream: true });
          const chunks = buffer.split('\n\n');
          buffer = chunks.pop() || '';
          for (const chunk of chunks) {
            const payload = parseSsePayload(chunk);
            if (!payload) continue;
            if (payload.event === 'trace') {
              appendGuideAgentTrace(payload);
            } else if (payload.event === 'final') {
              finalGuide = payload.response;
            } else if (payload.event === 'error') {
              throw new Error(payload.detail || '流式生成失败');
            }
          }
        }

        if (buffer.trim()) {
          const payload = parseSsePayload(buffer);
          if (payload && payload.event === 'final') finalGuide = payload.response;
        }

        if (!finalGuide) {
          throw new Error('未收到完整攻略结果');
        }
        return finalGuide;
      }

      function parseSsePayload(chunk) {
        const line = chunk.split('\n').find(l => l.startsWith('data:'));
        if (!line) return null;
        try {
          return JSON.parse(line.slice(5).trim());
        } catch (_) {
          return null;
        }
      }

                ${totalDescent ? metricCard('累计下降', totalDescent.toFixed(0) + ' m', '') : ''}

                      </div>
                      <div class="poi-list" id="poi-lodging">${renderPOIList(tr.lodging || [], 'lodging')}</div>
                      <div class="poi-list" id="poi-food" style="display:none">${renderPOIList(tr.food || [], 'food')}</div>
                      <div class="poi-list" id="poi-supply" style="display:none">${renderPOIList(tr.supply || [], 'supply')}</div>
                    </div>
                  </div>
                </div>
              </div>
            </div>`;

        // 7. Gear List
        if (guide.gear_list && guide.gear_list.categories.length > 0) {
          html += `<div class="guide-section">
            <div class="guide-section-header"><h3>装备物资清单</h3></div>
            <div class="guide-section-body">
              <div class="gear-grid">`;

              <h4>${icon} ${escapeHtml(cat.category)}</h4>

            focusGuidePoi(item.dataset.poiCategory, Number(item.dataset.poiIndex));
          });
        });

        bindTransportSelector(document.getElementById('guide-result-section'));
        initGuidePoiMap(guide);

      function renderTransportPlan(tp) {

          return `<button class="transport-choice${index === 0 ? ' active' : ''}" type="button" data-transport-index="${index}">
            <span class="transport-choice-title">${mode.icon} ${escapeHtml(mode.label)}</span>
            <span class="transport-choice-meta">${escapeHtml(summary || '查看方案详情')}</span>
          </button>`;
        }).join('');

        const panels = options.map((opt, index) => {
          const mode = transportModeMeta(opt.mode);
          return `<div class="transport-option transport-option-panel${index === 0 ? ' active' : ''}" data-transport-panel="${index}">
            <h4>${mode.icon} ${escapeHtml(mode.label)}</h4>
            <div class="transport-meta">
              ${opt.duration_hours != null ? `<span>⏱ <strong>${escapeHtml(opt.duration_hours)} 小时</strong></span>` : ''}
              ${opt.distance_km != null ? `<span>📏 <strong>${escapeHtml(opt.distance_km)} km</strong></span>` : ''}
              ${opt.price_estimate ? `<span>💰 ${escapeHtml(opt.price_estimate)}</span>` : opt.cost_estimate ? `<span>💰 ${escapeHtml(opt.cost_estimate)}</span>` : ''}
              ${opt.requires_user_verification ? `<span>需人工核验</span>` : ''}
            </div>
            ${opt.steps && opt.steps.length ? `<ol class="transport-steps">${opt.steps.map(s => `<li>${escapeHtml(s)}</li>`).join('')}</ol>` : ''}
            ${opt.booking_hint ? `<div class="transport-tip">订票提示：${escapeHtml(opt.booking_hint)}</div>` : ''}
            ${opt.tip ? `<div class="transport-tip">⚠ ${escapeHtml(opt.tip)}</div>` : ''}
          </div>`;
        }).join('');

        return `<div class="guide-section">
          <div class="guide-section-header"><h3>交通方案 · ${escapeHtml(tp.start_city)} → ${escapeHtml(tp.destination_name)}</h3></div>
          <div class="guide-section-body">
            <div class="transport-options">
              <div class="transport-selector" role="tablist" aria-label="交通方案选择">${buttons}</div>
              <div class="transport-panels">${panels}</div>
            </div>
          </div>
        </div>`;
      }

      function bindTransportSelector(root) {
        const scope = root || document;
        scope.querySelectorAll('.transport-selector').forEach(selector => {
          const section = selector.closest('.transport-options');
          if (!section) return;
          selector.querySelectorAll('.transport-choice').forEach(btn => {
            btn.addEventListener('click', () => {
              const index = btn.dataset.transportIndex;
              selector.querySelectorAll('.transport-choice').forEach(item => item.classList.toggle('active', item === btn));
              section.querySelectorAll('.transport-option-panel').forEach(panel => {
                panel.classList.toggle('active', panel.dataset.transportPanel === index);
              });
            });
          });
        });
      }

      function transportModeMeta(mode) {
        return {
          driving: { icon: '🚗', label: '自驾' },
          flight: { icon: '✈', label: '机票' },
          rail: { icon: '🚄', label: '高铁/火车' },
          charter: { icon: '🚐', label: '包车/接驳' },
          mixed: { icon: '⌁', label: '综合' },
          transit: { icon: '🚄', label: '公共交通' },
        }[mode] || { icon: '⌁', label: mode || '交通方案' };
      }

      function transportChoiceSummary(opt) {
        const parts = [];
        if (opt.duration_hours != null) parts.push(`${opt.duration_hours} 小时`);
        if (opt.distance_km != null) parts.push(`${opt.distance_km} km`);
        if (opt.price_estimate || opt.cost_estimate) parts.push(opt.price_estimate || opt.cost_estimate);
        return parts.join(' · ');
      }

      function renderReferenceResearch(ref) {
        const items = ref.items || [];
        const notes = ref.lodging_supply_transport_notes || [];
        const risks = ref.risk_notes || [];
        const checks = ref.verification_items || [];
        const warnings = ref.warnings || [];
        const itemCards = items.map(item => `
          <article class="reference-item">
            <h4>${escapeHtml(item.title || '参考攻略')}</h4>
            <p>${escapeHtml(item.summary || '已读取用户提供的参考材料。')}</p>
            ${item.url ? `<a class="reference-link" href="${escapeHtml(item.url)}" target="_blank" rel="noopener noreferrer">查看来源</a>` : ''}
            ${renderCompactReferenceList('可借鉴线索', [
              ...(item.route_clues || []),
              ...(item.lodging_clues || []),
              ...(item.supply_clues || []),
              ...(item.transport_clues || []),
            ])}
            ${renderCompactReferenceList('风险提醒', item.risk_notes || [])}
          </article>
        `).join('');

        return `<div class="guide-section">
          <div class="guide-section-header"><h3>参考攻略补充</h3></div>
          <div class="guide-section-body">
            ${ref.supplemental_summary ? `<div class="guide-summary" style="padding:0 0 12px">${escapeHtml(ref.supplemental_summary)}</div>` : ''}
            ${itemCards ? `<div class="reference-grid">${itemCards}</div>` : ''}
            ${renderCompactReferenceList('补充规划线索', [...(ref.itinerary_suggestions || []), ...notes])}
            ${renderCompactReferenceList('参考风险提醒', risks)}
            ${renderCompactReferenceList('待核验事项', checks)}
            ${warnings.length ? `<div style="margin-top:12px">${warnings.map(w => `<div class="decision-note">${escapeHtml(w)}</div>`).join('')}</div>` : ''}
          </div>
        </div>`;
      }

      function renderCompactReferenceList(title, items) {
        const clean = [...new Set((items || []).filter(Boolean))].slice(0, 6);
        if (!clean.length) return '';
        return `<p class="section-title" style="margin-top:12px">${escapeHtml(title)}</p><ul class="reference-list">${clean.map(item => `<li>${escapeHtml(item)}</li>`).join('')}</ul>`;
      }

      function normalizeWeatherCards(guide) {
        const dedupeCards = cards => {
          const seen = new Set();
          return cards.filter(card => {
            const key = [
              card.date || '',
              card.source || '',
              card.weatherText || '',
              card.detail || '',
              card.minTemp ?? '',
              card.maxTemp ?? '',
              card.precipitation ?? '',
              card.wind ?? '',
            ].join('|');
            if (seen.has(key)) return false;
            seen.add(key);
            return true;
          });
        };

        if (guide.weather_details && guide.weather_details.length) {
          return dedupeCards(guide.weather_details.map(w => ({
            title: w.title || '路线区域天气',
            date: w.date || '',
            weatherText: w.weather_text || w.title || '路线区域天气',
            detail: w.detail || '',
            source: w.source || 'unknown',
            maxTemp: w.max_temp_c,
            minTemp: w.min_temp_c,
            precipitation: w.precipitation_probability,
            wind: w.max_wind_kmh,
            gust: w.wind_gust_kmh,
            humidity: w.humidity_percent,
            riskNotes: w.hiking_risk_notes || [],
          })));
        }

        const fallback = guide.travel_research && guide.travel_research.weather ? guide.travel_research.weather : [];
        return dedupeCards(fallback.map(w => ({
          title: w.title || '路线区域天气',
          date: '',
          weatherText: w.metadata?.weather_text || w.title || '路线区域天气',
          detail: w.detail || '',
          source: w.source || 'static',
          maxTemp: w.metadata?.max_temp_c,
          minTemp: w.metadata?.min_temp_c,
          precipitation: w.metadata?.precipitation_probability,
          wind: w.metadata?.max_wind_kmh,
          gust: w.metadata?.wind_gust_kmh,
          humidity: w.metadata?.humidity_percent,
          riskNotes: w.metadata?.hiking_risk_notes || [],
        })));
      }

      function renderGuideWeatherSection(cards) {
        const riskCount = cards.reduce((sum, card) => sum + (card.riskNotes ? card.riskNotes.length : 0), 0);
        const sources = [...new Set(cards.map(card => card.source).filter(Boolean))];
        const sourceLabel = sources.length ? sources.join(' / ') : 'unknown';

        return `<div class="guide-section">
          <div class="guide-section-header"><h3>天气信息</h3></div>
          <div class="guide-section-body">
            <div class="guide-weather-summary">
              <div class="guide-weather-chip"><span>预报条目</span><strong>${cards.length} 条</strong></div>
              <div class="guide-weather-chip"><span>风险提示</span><strong>${riskCount} 条</strong></div>
              <div class="guide-weather-chip"><span>数据来源</span><strong>${escapeHtml(sourceLabel)}</strong></div>
            </div>
            <div class="guide-weather-grid">
              ${cards.map(renderGuideWeatherCard).join('')}
            </div>
          </div>
        </div>`;
      }

      function renderGuideWeatherCard(w) {
        const riskCount = w.riskNotes ? w.riskNotes.length : 0;
        const dateLabel = w.date ? formatDateCN(w.date) : w.title;
        const stats = [
          w.minTemp != null || w.maxTemp != null ? `<div class="guide-weather-stat">温度<strong>${formatTempRange(w.minTemp, w.maxTemp)}</strong></div>` : '',
          w.precipitation != null ? `<div class="guide-weather-stat">降水概率<strong>${escapeHtml(w.precipitation)}%</strong></div>` : '',
          w.wind != null ? `<div class="guide-weather-stat">最大风速<strong>${escapeHtml(w.wind)} km/h</strong></div>` : '',
          w.gust != null ? `<div class="guide-weather-stat">阵风<strong>${escapeHtml(w.gust)} km/h</strong></div>` : '',
          w.humidity != null ? `<div class="guide-weather-stat">湿度<strong>${escapeHtml(w.humidity)}%</strong></div>` : '',
        ].filter(Boolean).join('');

        return `<article class="guide-weather-card${riskCount ? ' has-risk' : ''}">
          <div class="guide-weather-card-head">
            <div class="guide-weather-date">${escapeHtml(dateLabel)}</div>
            <div class="guide-weather-source">${escapeHtml(w.source)}</div>
          </div>
          <div class="guide-weather-card-body">
            <div class="guide-weather-text">${escapeHtml(w.weatherText || '路线区域天气')}</div>
            ${w.detail ? `<div class="guide-weather-detail">${escapeHtml(w.detail)}</div>` : ''}
            ${stats ? `<div class="guide-weather-stats">${stats}</div>` : ''}
            ${riskCount ? `<ul class="guide-weather-risks">${w.riskNotes.map(n => `<li>${escapeHtml(n)}</li>`).join('')}</ul>` : ''}
          </div>
        </article>`;
      }

      function formatTempRange(minTemp, maxTemp) {
        if (minTemp != null && maxTemp != null) return `${minTemp}°C ~ ${maxTemp}°C`;
        if (minTemp != null) return `最低 ${minTemp}°C`;
        if (maxTemp != null) return `最高 ${maxTemp}°C`;
        return '—';
      }

      function renderPOIList(items, category) {
        if (!items.length) return '<div style="color:var(--muted);font-size:14px;padding:10px">暂无数据</div>';
        return items.map((item, index) => `
          <div class="poi-item ${item.coordinate ? 'has-coordinate' : ''}" data-poi-category="${escapeHtml(category)}" data-poi-index="${index}">
            <div style="flex:1">
              <div class="poi-name">${escapeHtml(item.title)}</div>
              <div class="poi-detail">${escapeHtml(item.detail)}</div>
            </div>
            ${item.distance_km != null ? `<div class="poi-dist">${item.distance_km} km</div>` : ''}
          </div>
        `).join('');
      }

      function stripDayPrefix(title, dayNumber) {
        const raw = String(title || '').trim();
        if (!raw) return '行程安排';
        return raw.replace(new RegExp(`^\\s*(day\\s*${dayNumber}|第\\s*${dayNumber}\\s*天)[：:、\\-\\s]*`, 'i'), '') || raw;
      }

      function loadGuideHistory() {
        try {
          const parsed = JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]');
          return Array.isArray(parsed) ? parsed : [];
        } catch {
          return [];
        }
      }

      function persistGuideHistory(items) {
        localStorage.setItem(HISTORY_KEY, JSON.stringify(items.slice(0, 30)));
        renderGuideHistory();
      }

      function saveGuideHistory(guide) {
        const rcsH = guide.route_candidates || [];
        const now = new Date();
        const id = `${Date.now()}-${Math.random().toString(16).slice(2)}`;
        const totalDistH = rcsH.reduce((s, c) => s + (Number(c.analysis.distance_km) || 0), 0);
        const totalDurH = rcsH.reduce((s, c) => s + (Number(c.analysis.estimated_duration_hours) || 0), 0);
        const routeNames = rcsH.map(c => c.route.name).filter(Boolean).join(' + ');
        const item = {
          id,
          favorite: false,
          created_at: now.toISOString(),
          destination: guide.destination || '未命名攻略',
          route_name: routeNames || (rcsH[0] ? rcsH[0].route.name : ''),
          route_summary: totalDistH ? `${totalDistH.toFixed(1)} km · ${totalDurH.toFixed(1)} h` : '',
          date_label: guide.itinerary && guide.itinerary.days && guide.itinerary.days[0]?.date ? guide.itinerary.days[0].date : formatDateISO(now),
          guide,
        };
        const existing = loadGuideHistory().filter(h => !(h.destination === item.destination && h.route_name === item.route_name));
        persistGuideHistory([item, ...existing]);
        markActiveHistory(id);
      }

      function renderGuideHistory() {
        if (!historyListEl) return;
        const items = loadGuideHistory().sort((a, b) => {
          if (a.favorite !== b.favorite) return a.favorite ? -1 : 1;
          return String(b.created_at).localeCompare(String(a.created_at));
        });
        if (!items.length) {
          historyListEl.innerHTML = `<div class="history-empty">生成攻略后会自动保存在这里。收藏会置顶。</div>`;
          return;
        }
        historyListEl.innerHTML = items.map(item => `
          <button class="history-item" data-history-id="${escapeHtml(item.id)}" type="button">
            <div class="history-title-row">
              <span class="history-title">${escapeHtml(item.destination)}</span>
              <span class="history-star" data-history-star="${escapeHtml(item.id)}" title="收藏">${item.favorite ? '★' : '☆'}</span>
            </div>
            <span class="history-meta">${escapeHtml(item.date_label || '')}</span>
            <span class="history-route">${escapeHtml(item.route_name || '攻略记录')}${item.route_summary ? ' · ' + escapeHtml(item.route_summary) : ''}</span>
          </button>
        `).join('');
        historyListEl.querySelectorAll('.history-item').forEach(btn => {
          btn.addEventListener('click', e => {
            const star = e.target.closest('[data-history-star]');
            if (star) {
              toggleGuideFavorite(star.dataset.historyStar);
              e.stopPropagation();
              return;
            }
            restoreGuideHistory(btn.dataset.historyId);
          });
        });
      }

      function toggleGuideFavorite(id) {
        const items = loadGuideHistory();
        const item = items.find(h => h.id === id);
        if (item) item.favorite = !item.favorite;
        persistGuideHistory(items);
        markActiveHistory(id);
      }

      function restoreGuideHistory(id) {
        const item = loadGuideHistory().find(h => h.id === id);
        if (!item || !item.guide) return;
        parseResults.innerHTML = '';
        renderGuideResult(item.guide, { saveHistory: false });
        markActiveHistory(id);
        const anchor = document.getElementById('guide-scroll-anchor');
        if (anchor) anchor.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }

      function markActiveHistory(id) {
        document.querySelectorAll('.history-item').forEach(btn => {
          btn.classList.toggle('active', btn.dataset.historyId === id);
        });
      }

      function hasCoordinatePOI(items) {
        return Array.isArray(items) && items.some(item => item && item.coordinate && item.coordinate.lon != null && item.coordinate.lat != null);
      }

      function poiCategories(guide) {
        const tr = guide.travel_research || {};
        return {
          lodging: { label: '住宿', color: '#50683e', items: tr.lodging || [] },
          food: { label: '餐饮', color: '#a6532b', items: tr.food || [] },
          supply: { label: '补给', color: '#2e6b9e', items: tr.supply || [] },
        };
      }

      async function initGuidePoiMap(guide) {
        const container = document.getElementById('guide-poi-map');
        if (!container) return;
        if (!amapKey) {
          container.outerHTML = `<div class="guide-poi-map-placeholder">地图服务暂不可用：未配置高德 Web Key。周边点位仍可在列表中核对。</div>`;
          return;
        }
        try {
          await loadAmapScript(amapKey);
        } catch {
          container.outerHTML = `<div class="guide-poi-map-placeholder">地图脚本加载失败，周边点位仍可在列表中核对。</div>`;
          return;
        }

        guidePoiMap = new AMap.Map('guide-poi-map', {
          zoom: 12,
          mapStyle: 'amap://styles/whitesmoke',
        });
        guidePoiInfoWindow = new AMap.InfoWindow({ offset: new AMap.Pixel(0, -28) });
        renderGuidePoiOverlays(guide);
      }

      function renderGuidePoiOverlays(guide) {
        if (!guidePoiMap || !window.AMap) return;
        guidePoiMap.clearMap();
        guidePoiMarkers = {};
        const allPoints = [];

        const rcs = guide.route_candidates || [];
        rcs.forEach((rc, idx) => {
          const color = ROUTE_COLORS[idx % ROUTE_COLORS.length];
          const routeCoords = rc.route && rc.route.coordinates ? rc.route.coordinates : [];
          if (routeCoords.length) {
            const path = routeCoords.map(c => [Number(c.lon), Number(c.lat)]).filter(p => Number.isFinite(p[0]) && Number.isFinite(p[1]));
            if (path.length) {
              guidePoiMap.add(new AMap.Polyline({
                path,
                strokeColor: color,
                strokeWeight: 4,
                strokeOpacity: 0.78,
                lineJoin: 'round',
                lineCap: 'round',
              }));
              allPoints.push(...path);
            }
          }
        });

        const cats = poiCategories(guide);
        Object.entries(cats).forEach(([category, config]) => {
          guidePoiMarkers[category] = [];
          if (!guidePoiActiveFilters.has(category)) return;
          config.items.forEach((item, index) => {
            if (!item.coordinate || item.coordinate.lon == null || item.coordinate.lat == null) return;
            const position = [Number(item.coordinate.lon), Number(item.coordinate.lat)];
            if (!Number.isFinite(position[0]) || !Number.isFinite(position[1])) return;
            const marker = new AMap.Marker({
              position,
              title: item.title,
              anchor: 'bottom-center',
              content: `<div style="width:24px;height:24px;border-radius:50%;background:${config.color};border:2px solid #fffcf4;box-shadow:0 4px 12px rgba(43,48,32,0.28);display:grid;place-items:center;color:#fff;font-size:12px;font-weight:900">${config.label[0]}</div>`,
            });
            marker.on('click', () => focusGuidePoi(category, index));
            guidePoiMap.add(marker);
            guidePoiMarkers[category][index] = marker;
            allPoints.push(position);
          });
        });

        if (allPoints.length) {
          guidePoiMap.setFitView(null, false, [36, 36, 36, 36]);
        }
      }

      function activatePoiFilter(category) {
        if (!category) return;
        guidePoiActiveFilters.add(category);
        document.querySelectorAll('.poi-map-filter').forEach(btn => {
          btn.classList.toggle('active', guidePoiActiveFilters.has(btn.dataset.poiFilter));
        });
      }

      function focusGuidePoi(category, index) {
        if (!category || !Number.isFinite(index)) return;
        activatePoiFilter(category);
        const guideSection = document.getElementById('guide-result-section');
        if (!guideSection) return;
        const guide = window.__lastGuideData;
        if (guide) renderGuidePoiOverlays(guide);
        const item = poiCategories(guide || {})[category]?.items?.[index];
        const marker = guidePoiMarkers[category]?.[index];
        document.querySelectorAll('.poi-item').forEach(el => el.classList.remove('active'));
        const row = document.querySelector(`.poi-item[data-poi-category="${category}"][data-poi-index="${index}"]`);
        if (row) row.classList.add('active');
        if (!item || !marker || !guidePoiMap || !guidePoiInfoWindow) return;
        const pos = marker.getPosition();
        guidePoiMap.panTo(pos);
        guidePoiInfoWindow.setContent(renderPoiInfoWindow(item, category));
        guidePoiInfoWindow.open(guidePoiMap, pos);
      }

      function renderPoiInfoWindow(item, category) {
        const labels = { lodging: '住宿', food: '餐饮', supply: '补给' };
        const tel = item.metadata && item.metadata.tel ? `<div style="margin-top:4px;color:#50683e;font-weight:700">电话：${escapeHtml(item.metadata.tel)}</div>` : '';
        const dist = item.distance_km != null ? `<div style="margin-top:4px;color:#a6532b">距采样点约 ${escapeHtml(item.distance_km)} km</div>` : '';
        return `<div style="min-width:180px;max-width:260px;padding:4px 2px">
          <div style="font-size:12px;color:#7b6f55;margin-bottom:2px">${escapeHtml(labels[category] || '周边')}</div>
          <div style="font-weight:800;color:#24301d;margin-bottom:4px">${escapeHtml(item.title)}</div>
          <div style="font-size:12px;color:#5f614f;line-height:1.5">${escapeHtml(item.metadata?.address || item.detail || '')}</div>
          ${tel}
          ${dist}
        </div>`;
      }
    </script>
  </body>
</html>
